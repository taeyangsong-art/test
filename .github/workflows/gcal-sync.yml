name: gcal-sync

# 회사 구글 캘린더(비공개 iCal 주소)를 매시간 읽어 calendar-data.js 로 동기화
on:
  schedule:
    - cron: '5 * * * *'   # 매시 5분(UTC) ≈ 1시간마다
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: node-ical 설치
        run: npm install --no-save node-ical@^0.20.1

      - name: 구글 캘린더 동기화
        env:
          GCAL_ICAL_URL: ${{ secrets.GCAL_ICAL_URL }}
        run: node scripts/fetch-calendar.js

      - name: 변경 시 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet calendar-data.js; then
            echo "변경 없음 — 커밋 생략"
          else
            git add calendar-data.js
            git commit -m "chore: 구글 캘린더 동기화 ($(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M'))"
            git push
          fi
