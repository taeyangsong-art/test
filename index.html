<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<title>원격파트 대시보드 · iShopCare</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<style>
  :root{
    --ink:#1d1d1f; --ink-soft:#424245; --gray:#6e6e73; --gray2:#86868b;
    --line:#d2d2d7; --line-soft:#e8e8ed; --surface:#f5f5f7; --surface2:#fafafa;
    --canvas:#ffffff; --blue:#0071e3; --blue-soft:#e8f1fd; --blue-deep:#0060c0;
    --red:#ff3b30; --red-soft:#ffecec; --green:#34c759; --green-soft:#e7f8ec;
    --orange:#ff9500; --purple:#5e5ce6;
    --sat:#0a84ff; --sun:#ff3b30;
    --shadow:0 1px 3px rgba(0,0,0,.06),0 6px 20px rgba(0,0,0,.05);
    --radius:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro KR","Apple SD Gothic Neo",
      "Pretendard","Segoe UI",Roboto,sans-serif;
    background:var(--surface); color:var(--ink);
    -webkit-font-smoothing:antialiased; line-height:1.45;
    display:flex; min-height:100vh;
  }

  /* ===== Sidebar ===== */
  .sidebar{
    width:248px; flex:0 0 248px; background:var(--canvas);
    border-right:1px solid var(--line-soft); padding:26px 16px;
    display:flex; flex-direction:column; gap:6px; position:sticky; top:0; height:100vh;
  }
  .brand{padding:4px 12px 22px; }
  .brand h1{font-size:17px; font-weight:700; letter-spacing:-.02em; line-height:1.3}
  .brand p{font-size:12px; color:var(--gray2); margin-top:4px}
  .nav-label{font-size:11px; font-weight:700; letter-spacing:.06em; color:var(--gray2);
    padding:8px 12px 4px; text-transform:uppercase}
  .navbtn{
    display:flex; align-items:center; gap:11px; width:100%; text-align:left;
    padding:11px 13px; border:none; background:none; border-radius:11px;
    font-size:15px; font-weight:500; color:var(--ink-soft); cursor:pointer;
    transition:background .15s, color .15s; font-family:inherit;
  }
  .navbtn:hover{background:var(--surface)}
  .navbtn.active{background:var(--blue); color:#fff; font-weight:600}
  .navbtn .ic{width:20px; text-align:center; font-size:16px}
  .lock-out{margin-top:auto; display:flex; align-items:center; justify-content:center; gap:8px;
    padding:11px 13px; border:1px solid var(--line-soft); background:none; border-radius:11px;
    font-size:13px; font-weight:600; color:var(--gray); cursor:pointer; font-family:inherit; transition:.15s}
  .lock-out:hover{background:var(--surface); color:var(--ink)}

  /* ===== Main ===== */
  .main{flex:1; min-width:0; padding:32px 40px 64px; overflow-x:hidden}
  .page-head{display:flex; align-items:flex-end; justify-content:space-between; gap:20px;
    flex-wrap:wrap; margin-bottom:26px}
  .page-head h2{font-size:30px; font-weight:700; letter-spacing:-.03em}
  .page-head .sub{font-size:14px; color:var(--gray); margin-top:5px}

  /* controls */
  .controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
  .seg{display:inline-flex; background:var(--surface); border-radius:11px; padding:3px;
    border:1px solid var(--line-soft)}
  .seg button{border:none; background:none; padding:8px 16px; border-radius:8px;
    font-size:13px; font-weight:600; color:var(--gray); cursor:pointer; font-family:inherit;
    transition:.15s}
  .seg button.on{background:var(--canvas); color:var(--ink); box-shadow:0 1px 2px rgba(0,0,0,.08)}
  input[type=date]{font-family:inherit; font-size:14px; padding:9px 13px; border:1px solid var(--line);
    border-radius:11px; background:var(--canvas); color:var(--ink); cursor:pointer}
  .btn{border:none; background:var(--canvas); border:1px solid var(--line);
    padding:9px 15px; border-radius:11px; font-size:13px; font-weight:600; color:var(--ink);
    cursor:pointer; font-family:inherit; transition:.15s}
  .btn:hover{background:var(--surface)}
  .btn.primary{background:var(--blue); color:#fff; border-color:var(--blue)}
  .btn.primary:hover{background:var(--blue-deep)}

  /* sidebar divider */
  .nav-div{height:1px; background:var(--line-soft); margin:8px 12px}

  /* Overview 헤드라인/알림/근무/랭킹 */
  .headline{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:24px}
  .hl-card{border-radius:20px; padding:18px 20px; border:1.5px solid transparent; position:relative; overflow:hidden; transition:transform .15s}
  .hl-card:hover{transform:translateY(-2px)}
  .hl-card.blue{background:linear-gradient(155deg,#e9f2ff,#f6faff); border-color:#d5e6ff}
  .hl-card.gold{background:linear-gradient(155deg,#fff5db,#fffdf4); border-color:#ffe6a8}
  .hl-card.mint{background:linear-gradient(155deg,#e4faef,#f4fffa); border-color:#c3efd7}
  .hl-ic{font-size:26px; line-height:1; margin-bottom:8px}
  .hl-lab{font-size:13px; font-weight:700; color:var(--gray)}
  .hl-big{font-size:33px; font-weight:800; letter-spacing:-.03em; line-height:1.12; margin-top:2px; color:var(--ink)}
  .hl-big small{font-size:14px; font-weight:600; color:var(--gray2); margin-left:2px}
  /* MVP 처리건수 강조 + 클릭 */
  .mvp-proc{margin-top:6px; cursor:pointer; display:inline-flex; align-items:baseline; gap:4px; padding:4px 12px; border-radius:20px;
    background:rgba(199,120,0,.12); transition:.15s}
  .mvp-proc:hover{background:rgba(199,120,0,.22); transform:translateY(-1px)}
  .mvp-proc b{font-size:30px; font-weight:800; color:#c77800; letter-spacing:-.02em}
  .mvp-proc small{font-size:14px; font-weight:700; color:#a86400}
  .mvp-proc-hint{font-size:11px; font-weight:700; color:#c77800; margin-left:6px; opacity:.8}
  /* 클릭 가능한 타일 */
  .ov-tile.clickable{cursor:pointer; transition:.15s}
  .ov-tile.clickable:hover{transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,0,0,.08)}
  .ov-drill-ic{font-size:11px; margin-left:5px; opacity:.4}
  /* 처리 상세 모달 */
  .detail-overlay{position:fixed; inset:0; z-index:9998; background:rgba(0,0,0,.45); display:flex; align-items:center; justify-content:center; padding:20px}
  .detail-box{background:var(--canvas,#fff); border-radius:18px; width:100%; max-width:640px; max-height:82vh; display:flex; flex-direction:column; padding:20px 22px; box-shadow:0 24px 60px rgba(0,0,0,.3)}
  .detail-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px}
  .detail-head h3{font-size:17px; font-weight:800; color:var(--ink)}
  .detail-x{border:none; background:var(--surface2); width:30px; height:30px; border-radius:50%; font-size:15px; cursor:pointer; color:var(--gray)}
  .detail-x:hover{background:var(--line-soft)}
  .detail-scroll{overflow:auto; margin-top:12px}
  .hl-card.blue .hl-big{color:#1a56db}
  .hl-card.gold .hl-big{color:#c77800}
  .hl-card.mint .hl-big{color:#0f9d58}
  .hl-card .ov-delta{margin-top:7px; font-size:12.5px; font-weight:700}
  .hl-card .ov-delta.up{color:var(--green)} .hl-card .ov-delta.down{color:var(--red)} .hl-card .ov-delta.flat{color:var(--gray2)}
  .hl-card .ov-delta span{color:var(--gray2); font-weight:500}
  /* 오늘의 MVP 축하 효과 */
  #mvpCard{overflow:visible}
  .mvp-flash{position:absolute; inset:0; border-radius:20px; background:radial-gradient(circle at 50% 45%,#fff,rgba(255,255,255,0) 70%); opacity:0; pointer-events:none; z-index:3}
  .mvp-confetti{position:absolute; left:50%; top:46%; width:0; height:0; pointer-events:none; z-index:4}
  .confetti{position:absolute; left:0; top:0; width:9px; height:13px; opacity:0; will-change:transform,opacity; animation:confettiPop 1.4s cubic-bezier(.2,.7,.3,1) forwards}
  @keyframes confettiPop{0%{opacity:1; transform:translate(0,0) rotate(0) scale(1)}70%{opacity:1}100%{opacity:0; transform:translate(var(--dx),calc(var(--dy) + 70px)) rotate(var(--rot)) scale(.5)}}
  #mvpCard.celebrate{animation:mvpGlow 1.1s ease-out}
  @keyframes mvpGlow{0%{box-shadow:0 0 0 rgba(255,190,60,0)}22%{box-shadow:0 0 34px rgba(255,190,60,.85)}100%{box-shadow:0 0 0 rgba(255,190,60,0)}}
  #mvpCard.celebrate .mvp-flash{animation:mvpFlash .6s ease-out}
  @keyframes mvpFlash{0%{opacity:0}14%{opacity:.9}100%{opacity:0}}
  #mvpCard.celebrate .hl-ic{animation:mvpBounce .9s ease}
  @keyframes mvpBounce{0%,100%{transform:scale(1) rotate(0)}30%{transform:scale(1.45) rotate(-10deg)}60%{transform:scale(1.12) rotate(7deg)}}
  .alert-list{display:flex; flex-direction:column; gap:8px}
  .alert-item{display:flex; align-items:center; justify-content:space-between; padding:11px 14px;
    background:var(--red-soft); border-radius:11px; font-size:14px; font-weight:600; color:var(--ink)}
  .alert-cnt{background:var(--red); color:#fff; font-weight:800; font-size:13px; min-width:24px; text-align:center;
    padding:2px 9px; border-radius:20px}
  .duty-today{display:flex; flex-direction:column; gap:8px; margin-bottom:12px}
  .dt-row{display:flex; align-items:center; gap:10px; font-size:14px}
  .dt-name{font-weight:600; color:var(--ink)}
  .dt-leave{font-size:13.5px; color:var(--slate,#454b54); border-top:1px solid var(--line-soft); padding-top:11px}
  .dt-leave b{color:var(--ink)}
  .leave-list{display:flex; flex-wrap:wrap; gap:9px}
  .leave-item{display:inline-flex; align-items:center; gap:9px; padding:9px 14px;
    background:var(--surface2); border:1px solid var(--line-soft); border-radius:12px}
  .leave-emp{font-size:15px; font-weight:700; color:var(--ink)}
  .leave-type{font-size:12px; font-weight:700; padding:3px 10px; border-radius:20px; white-space:nowrap}
  .leave-time{font-size:12.5px; font-weight:600; color:var(--gray); white-space:nowrap}
  .cat-chip{display:inline-block; font-size:12px; font-weight:700; padding:3px 10px; border-radius:20px; white-space:nowrap}
  .cnt-badge{display:inline-block; background:var(--red); color:#fff; font-size:12px; font-weight:800; padding:1px 9px; border-radius:20px; margin-left:6px; vertical-align:middle}
  .rank-row{display:flex; gap:12px; flex-wrap:wrap}
  .rank-item{flex:1; min-width:96px; text-align:center; padding:14px 10px; border-radius:14px;
    background:var(--surface2); border:1px solid var(--line-soft)}
  .rank-item.top{background:linear-gradient(180deg,#fff9e8,#fafafa); border-color:#ffe9a8}
  .rank-medal{font-size:22px; font-weight:800; color:var(--gray)}
  .rank-name{font-size:15px; font-weight:700; margin-top:4px; color:var(--ink)}
  .rank-val{font-size:13px; color:var(--gray); margin-top:2px; font-weight:600}
  /* 랭킹 테마 — 천국(밝음) vs 어둠 */
  .rank-sub{font-size:12px; font-weight:800; margin-left:6px}
  .light-rank{background:linear-gradient(165deg,#eef5ff,#fff5fb); border:1px solid #dbe8ff}
  .light-rank .rank-sub{color:#ff86c2}
  .rank-item.light{background:#fff; border:1px solid #e6eeff}
  .rank-item.light.top{background:linear-gradient(180deg,#fff8e6,#fffdf7); border-color:#ffd766; animation:lightpulse 2.2s ease-in-out infinite}
  @keyframes lightpulse{0%,100%{box-shadow:0 0 8px rgba(255,205,70,.45); border-color:#ffe6a0}50%{box-shadow:0 0 24px rgba(255,214,90,.95); border-color:#ffcf4d}}
  .dark-rank{background:linear-gradient(165deg,#edeef4,#f6f2fa); border:1px solid #d6cae8}
  .dark-rank .card-head h3{color:var(--ink)}
  .dark-rank .hint{color:var(--gray2)}
  .dark-rank .rank-sub{color:#9a1f47}
  .rank-item.dark{background:#f2ecfb; border:1px solid #4a3568}
  .rank-item.dark .rank-name{color:#111111 !important; font-weight:800; font-size:16px}
  .rank-item.dark .rank-val{color:#b02050; font-weight:800}
  .rank-item.dark.worst{background:linear-gradient(180deg,#ffdbe6,#f2e6fb); border-color:#c02f5e; animation:darkpulse 2.2s ease-in-out infinite}
  .rank-item.dark.worst .rank-name{color:#7a0f2e !important}
  @keyframes darkpulse{0%,100%{box-shadow:0 0 12px rgba(190,40,95,.32)}50%{box-shadow:0 0 26px rgba(190,40,95,.62)}}
  .voc-snap{display:flex; gap:24px; flex-wrap:wrap}
  .snap-big{font-size:30px; font-weight:800; letter-spacing:-.03em; line-height:1.1; color:var(--ink); margin-top:3px}
  .voc-proc{font-weight:700; color:var(--green,#166534)}
  /* 🎮 원격 상점 */
  .r-face{margin-right:3px}
  .r-title{font-size:11px; font-weight:800; color:#9c36b5; margin-right:4px}
  .game-me{display:flex; align-items:center; gap:22px; background:linear-gradient(160deg,#f3f0ff,#fff)}
  .avatar-big{position:relative; width:96px; height:96px; flex:0 0 auto; background:radial-gradient(circle at 50% 40%,#fff,#eef);
    border:2px solid #e4dcff; border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:48px}
  .ab-hat{position:absolute; top:-6px; font-size:30px}
  .ab-outfit{position:absolute; bottom:2px; font-size:24px}
  .ab-pet{position:absolute; right:-8px; bottom:-6px; font-size:26px}
  .gm-title{font-size:14px; font-weight:800; color:#9c36b5}
  .gm-name{font-size:26px; font-weight:800; letter-spacing:-.02em; color:var(--ink)}
  .gm-coins{font-size:20px; font-weight:700; margin-top:6px}
  .gm-coins b{font-size:26px; color:#e8a020}
  .gm-coins span{font-size:12px; color:var(--gray); font-weight:600; margin-left:5px}
  .gm-sub{font-size:12.5px; color:var(--gray2); margin-top:4px}
  .shop-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:12px}
  .shop-item{border:2px solid var(--rar); border-radius:14px; padding:12px 10px; text-align:center; background:var(--surface2); position:relative}
  .shop-item.equipped{box-shadow:0 0 0 3px color-mix(in srgb,var(--rar) 30%,transparent)}
  .si-rar{font-size:10px; font-weight:800; color:var(--rar); letter-spacing:.03em}
  .si-disp{font-size:30px; line-height:1.1; margin:6px 0 4px; min-height:34px; display:flex; align-items:center; justify-content:center; font-weight:800}
  .si-name{font-size:13px; font-weight:700; color:var(--ink); margin-bottom:9px}
  .si-buy{width:100%; border:none; border-radius:9px; padding:8px; font-family:inherit; font-size:12.5px; font-weight:800; cursor:pointer;
    background:var(--ink); color:#fff; transition:.15s}
  .si-buy:hover{filter:brightness(1.1)}
  .si-buy.own{background:#e6eeff; color:#1a56db}
  .si-buy.on{background:var(--green,#16a34a); color:#fff; cursor:default}
  .r-title{font-size:11px; font-weight:800; margin-right:4px}
  .tr-legendary,.tr-mythic{background-size:200% auto; animation:titleShine 2.6s linear infinite}
  @keyframes titleShine{to{background-position:-200% center}}
  /* 🎣 낚시터 */
  .fish-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px}
  .fish-spot{border-radius:16px; padding:18px 16px; text-align:center; color:#fff; border:2px solid rgba(255,255,255,.25)}
  .fish-spot.fs-low{background:linear-gradient(160deg,#4aa3c7,#2d7d9a)}
  .fish-spot.fs-mid{background:linear-gradient(160deg,#5a67d8,#3f2b96)}
  .fish-spot.fs-high{background:linear-gradient(160deg,#0b1b3a,#123a5e); border-color:#3fa9ff}
  .fs-emoji{font-size:38px; line-height:1}
  .fs-name{font-size:17px; font-weight:800; margin-top:6px}
  .fs-desc{font-size:12px; opacity:.9; margin-top:5px; min-height:30px}
  .fs-cost{font-size:13px; font-weight:700; margin:8px 0 12px}
  .fs-btn{width:100%; border:none; border-radius:11px; padding:11px; font-family:inherit; font-size:14px; font-weight:800; cursor:pointer;
    background:#fff; color:#123; transition:.15s}
  .fs-btn:hover:not(:disabled){transform:translateY(-2px)}
  .fs-btn:disabled{opacity:.5; cursor:not-allowed}
  .fish-pop{background:var(--canvas,#fff); border-radius:22px; padding:30px 34px; text-align:center; max-width:320px; width:88%;
    box-shadow:0 24px 60px rgba(0,0,0,.3)}
  .fish-pop.reveal{animation:dutypop .3s cubic-bezier(.2,.9,.3,1.3); border:3px solid var(--rc)}
  .fp-rod{font-size:52px; animation:fpwiggle .6s ease-in-out infinite}
  @keyframes fpwiggle{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(12deg)}}
  .fp-wait{margin-top:12px; font-size:15px; font-weight:700; color:var(--gray)}
  .fp-cast-scene{position:relative; height:96px; display:flex; align-items:center; justify-content:center}
  .fp-cast-scene .fp-rod{position:relative; z-index:2}
  .fp-bob{position:absolute; bottom:6px; font-size:16px; animation:frFloat 1.4s ease-in-out infinite}
  .fp-ripple{position:absolute; bottom:8px; width:20px; height:20px; border:2px solid #4ea8ff; border-radius:50%; opacity:0; animation:fpRipple 1.8s ease-out infinite}
  .fp-ripple.d2{animation-delay:.6s} .fp-ripple.d3{animation-delay:1.2s}
  @keyframes fpRipple{0%{transform:scale(.4);opacity:.7}100%{transform:scale(3.4);opacity:0}}
  .fish-pop.win{box-shadow:0 24px 60px rgba(0,0,0,.3), 0 0 40px var(--rc)}
  .fish-pop.epic-up{animation:dutypop .3s cubic-bezier(.2,.9,.3,1.3), winShake .5s ease-in-out 2}
  @keyframes winShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px) rotate(-1deg)}75%{transform:translateX(6px) rotate(1deg)}}
  .fp-rays{position:absolute; top:22px; left:50%; width:220px; height:220px; margin-left:-110px; z-index:0;
    background:conic-gradient(var(--rc) 0 8deg, transparent 8deg 30deg, var(--rc) 30deg 38deg, transparent 38deg 60deg, var(--rc) 60deg 68deg, transparent 68deg 90deg, var(--rc) 90deg 98deg, transparent 98deg 120deg, var(--rc) 120deg 128deg, transparent 128deg 150deg, var(--rc) 150deg 158deg, transparent 158deg 180deg, var(--rc) 180deg 188deg, transparent 188deg 210deg, var(--rc) 210deg 218deg, transparent 218deg 240deg, var(--rc) 240deg 248deg, transparent 248deg 270deg, var(--rc) 270deg 278deg, transparent 278deg 300deg, var(--rc) 300deg 308deg, transparent 308deg 330deg, var(--rc) 330deg 338deg, transparent 338deg 360deg);
    opacity:.35; border-radius:50%; animation:raysSpin 9s linear infinite; -webkit-mask:radial-gradient(circle,transparent 30%,#000 34%); mask:radial-gradient(circle,transparent 30%,#000 34%)}
  @keyframes raysSpin{to{transform:rotate(360deg)}}
  .fish-pop .fp-emoji,.fish-pop .fp-big,.fish-pop .fp-sub,.fish-pop .duty-pop-btn{position:relative; z-index:1}
  .fp-emoji{font-size:60px; line-height:1}
  .fp-big{margin-top:8px; font-size:24px; font-weight:800; letter-spacing:-.02em; color:var(--ink)}
  .fp-sub{margin-top:6px; font-size:14px; color:var(--gray)}
  .fish-room{color:#fff; text-align:center}
  .fish-room.fs-low{background:linear-gradient(160deg,#4aa3c7,#2d7d9a)}
  .fish-room.fs-mid{background:linear-gradient(160deg,#5a67d8,#3f2b96)}
  .fish-room.fs-high{background:linear-gradient(160deg,#0b1b3a,#123a5e)}
  .fr-scene{position:relative; height:180px; border-radius:16px; overflow:hidden; margin-bottom:16px;
    background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(0,0,0,.15))}
  .fr-shimmer{position:absolute; inset:0; background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,.35) 50%,transparent 70%);
    background-size:220% 100%; animation:frShimmer 3.2s linear infinite; pointer-events:none}
  @keyframes frShimmer{to{background-position:-220% 0}}
  .fr-sun{position:absolute; top:14px; left:50%; transform:translateX(-50%); font-size:62px; filter:drop-shadow(0 4px 10px rgba(0,0,0,.3)); animation:frBob 3s ease-in-out infinite}
  @keyframes frBob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-8px)}}
  .fr-rod{position:absolute; top:8px; right:26%; font-size:44px; transform-origin:bottom left; animation:fpwiggle 1.6s ease-in-out infinite}
  .fr-float{position:absolute; bottom:44px; right:30%; font-size:15px; animation:frFloat 1.9s ease-in-out infinite}
  @keyframes frFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(7px)}}
  .fr-wave{position:absolute; left:-20%; right:-20%; height:38px; border-radius:45%;
    background:rgba(255,255,255,.16); animation:frWave 4s ease-in-out infinite}
  .fr-wave.w1{bottom:-14px; animation-duration:3.4s}
  .fr-wave.w2{bottom:-24px; background:rgba(255,255,255,.12); animation-duration:4.6s; animation-direction:reverse}
  .fr-wave.w3{bottom:-34px; background:rgba(255,255,255,.09); animation-duration:5.6s}
  @keyframes frWave{0%,100%{transform:translateX(-6%) scaleY(1)}50%{transform:translateX(6%) scaleY(1.25)}}
  .fr-bubbles span{position:absolute; bottom:-12px; width:9px; height:9px; border-radius:50%;
    background:rgba(255,255,255,.5); animation:frBubble 3.6s ease-in infinite}

  .fr-bubbles span:nth-child(2){left:26%; animation-delay:.8s; width:6px;height:6px}
  .fr-bubbles span:nth-child(3){left:40%; animation-delay:1.6s}
  .fr-bubbles span:nth-child(4){left:58%; animation-delay:.4s; width:5px;height:5px}
  .fr-bubbles span:nth-child(5){left:72%; animation-delay:2.2s}
  .fr-bubbles span:nth-child(6){left:84%; animation-delay:1.2s; width:7px;height:7px}
  .fr-bubbles span:nth-child(7){left:48%; animation-delay:2.8s; width:4px;height:4px}

  .fr-cast:disabled{opacity:.55; cursor:not-allowed}
  .fr-odds{margin-top:14px; font-size:13px; font-weight:600; opacity:.95}
  .fp-own{font-size:11px; font-weight:800; color:var(--gray2); margin-top:2px}
  .fp-own.yes{color:var(--green,#16a34a)}
  /* 🔍 아이템 미리보기 툴팁 */
  .item-tip{position:fixed; z-index:9999; display:none; pointer-events:none; left:0; top:0; animation:tipIn .12s ease-out}
  @keyframes tipIn{from{opacity:0; transform:scale(.9)}to{opacity:1; transform:scale(1)}}
  .it-tip-inner{background:var(--canvas,#fff); border:2px solid var(--rar,#8a94a6); border-radius:16px; padding:14px 16px;
    min-width:150px; text-align:center; box-shadow:0 16px 40px rgba(0,0,0,.28), 0 0 20px var(--rar,#8a94a6)}
  .it-tip-top{display:flex; gap:6px; justify-content:center; align-items:center; margin-bottom:8px}
  .it-tip-rar{font-size:12px; font-weight:800; letter-spacing:.03em}
  .it-tip-fish{font-size:10px; font-weight:800; color:#0aa5b1; background:#e0f7fa; border-radius:20px; padding:2px 8px}
  .it-tip-disp{min-height:52px; display:flex; align-items:center; justify-content:center; margin:2px 0 8px}
  .it-tip-name{font-size:13px; font-weight:700; color:var(--ink)}
  .it-tip-foot{margin-top:6px; font-size:12px; font-weight:700; color:var(--gray)}
  .preview-hint{font-size:12.5px; color:var(--gray2); margin:-8px 2px 16px; font-weight:600}
  .game-me.previewing{outline:2px dashed #c8a2ff; outline-offset:2px}
  .game-me.previewing::after{content:'👀 미리보기'; position:absolute; top:10px; right:14px; font-size:12px; font-weight:800; color:#8a3ffb}
  .game-me{position:relative}
  .shop-item{cursor:pointer}
  /* 리프레쉬 타임 */
  .rt-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:16px}
  .rt-slot{border:2px solid var(--line-soft); border-radius:18px; padding:20px 22px; background:var(--surface2); transition:.15s}
  .rt-slot:hover{border-color:#ffd6a8; transform:translateY(-2px)}
  .rt-slot.on{border-color:#ffcf99; background:linear-gradient(160deg,#fff3e2,#fffaf4); box-shadow:0 4px 14px rgba(255,149,0,.15)}
  .rt-time{font-size:16px; font-weight:800; color:var(--gray); margin-bottom:12px; display:flex; align-items:center; gap:6px}
  .rt-time::before{content:'⏰'; font-size:18px}
  .rt-slot.on .rt-time{color:#c2410c}
  .rt-slot.on .rt-time::before{content:'☕'}
  .rt-name{width:100%; border:none; background:transparent; font-family:inherit; font-size:20px; font-weight:800; color:var(--ink); padding:3px 0}
  .rt-name:focus{outline:none}
  .rt-name::placeholder{color:var(--gray2); font-weight:500}
  /* live 갱신 표시 */
  .live-dot{display:inline-block; width:9px; height:9px; border-radius:50%; background:var(--green);
    margin-left:6px; vertical-align:middle; animation:livePulse 1.8s ease-in-out infinite}
  @keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(52,199,89,.5)}50%{box-shadow:0 0 0 6px rgba(52,199,89,0)}}

  /* ===== Overview ===== */
  .ov-tiles{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px}
  .ov-tile{background:var(--canvas); border-radius:16px; padding:16px 18px; box-shadow:var(--shadow);
    border-left:4px solid var(--c,var(--blue))}
  .ov-tile .ov-name{font-size:16px; font-weight:600; color:var(--gray); display:flex; align-items:center; gap:6px}
  .ov-tile .ov-ic{font-size:18px}
  .ov-tile .ov-val{font-size:40px; font-weight:800; letter-spacing:-.03em; margin-top:9px; line-height:1}
  .ov-tile .ov-val small{font-size:16px; font-weight:600; color:var(--gray2); margin-left:4px}
  .ov-tile .ov-delta{font-size:12.5px; font-weight:700; margin-top:7px}
  .ov-tile .ov-delta.up{color:var(--green)} .ov-tile .ov-delta.down{color:var(--red)} .ov-tile .ov-delta.flat{color:var(--gray2)}
  .ov-tile .ov-delta span{color:var(--gray2); font-weight:500}
  .ov-tile.grand{background:linear-gradient(135deg,#0071e3,#4a9bff); border-left-color:#0060c0}
  .ov-tile.grand .ov-name{color:rgba(255,255,255,.9)}
  .ov-tile.grand .ov-val{color:#fff}
  .ov-tile.grand .ov-val small{color:rgba(255,255,255,.85)}
  .ov-tile.grand .ov-delta,.ov-tile.grand .ov-delta span{color:rgba(255,255,255,.92)}
  .ov-tile.pend{background:linear-gradient(135deg,#fff0df,#fff8f1); border-left-color:#ff9500}
  .ov-tile.pend .ov-name{color:#b45309}
  .ov-tile.pend .ov-val{color:#e8590c}
  .ov-tile.pend .ov-delta,.ov-tile.pend .ov-delta span{color:#c2703a}

  table.matrix{width:100%; border-collapse:collapse; font-size:14px; min-width:640px}
  table.matrix th{background:var(--surface); color:var(--steel,#6b7280); font-weight:700; font-size:12px;
    text-align:right; padding:10px 12px; border-bottom:1px solid var(--line); line-height:1.35; white-space:nowrap}
  table.matrix th:first-child{text-align:left}
  table.matrix td{padding:9px 12px; border-bottom:1px solid var(--line-soft); text-align:right}
  table.matrix td:first-child{text-align:left; white-space:nowrap}
  table.matrix .mcell{font-weight:600; border-radius:4px}
  table.matrix .zero{color:var(--muted)}
  table.matrix .tot{font-weight:800; font-size:17px; color:var(--blue-deep); background:var(--blue-soft)}
  table.matrix tfoot td{font-weight:800; font-size:16px; color:var(--blue-deep); border-top:2px solid var(--blue); background:var(--blue-soft)}
  table.matrix tfoot td:first-child{color:var(--slate,#454b54); background:var(--surface)}
  table.matrix tfoot td.tot{font-size:19px; color:#fff; background:var(--blue)}
  table.matrix tbody tr:hover td{background:var(--surface-soft)}

  .stack-row{display:flex; align-items:center; gap:12px; margin-bottom:9px}
  .stack-name{flex:0 0 64px; font-size:14px; font-weight:600; color:var(--ink-soft)}
  .stack-track{flex:1; height:16px; background:var(--surface); border-radius:8px; overflow:hidden}
  .stack-fill{height:100%; display:flex; border-radius:8px; overflow:hidden; transition:width .5s cubic-bezier(.22,1,.36,1)}
  .stack-fill span{display:block; min-width:2px}
  .stack-total{flex:0 0 40px; text-align:right; font-size:14px; font-weight:700}

  /* KPI cards */
  .kpis{display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px}
  .kpi{background:var(--canvas); border-radius:var(--radius); padding:20px 22px; box-shadow:var(--shadow)}
  .kpi .lab{font-size:13px; color:var(--gray); font-weight:600}
  .kpi .val{font-size:34px; font-weight:700; letter-spacing:-.03em; margin-top:8px; line-height:1}
  .kpi .val small{font-size:15px; font-weight:600; color:var(--gray2); margin-left:3px}
  .kpi .delta{font-size:12.5px; margin-top:8px; font-weight:600}
  .kpi .delta.up{color:var(--green)} .kpi .delta.down{color:var(--red)} .kpi .delta.flat{color:var(--gray2)}
  /* 컬러 KPI (VOC·먼슬리 상단) */
  .kpi.k-blue{background:linear-gradient(160deg,#eef4ff,#fbfdff); border-left:5px solid #1a73e8}
  .kpi.k-blue .val{color:#1a56db}
  .kpi.k-amber{background:linear-gradient(160deg,#fff6e4,#fffdf6); border-left:5px solid #ff9500}
  .kpi.k-amber .val{color:#c77800}
  .kpi.k-coral{background:linear-gradient(160deg,#ffeef1,#fff8f9); border-left:5px solid #ff5a5f}
  .kpi.k-coral .val{color:#e0315a}
  .kpi.k-red{background:linear-gradient(160deg,#ffe8e8,#fff6f6); border-left:5px solid #ff3b30}
  .kpi.k-red .val{color:#d92d20}
  .kpi.k-teal{background:linear-gradient(160deg,#e3f8f5,#f5fffd); border-left:5px solid #0aa5b1}
  .kpi.k-teal .val{color:#0a8a94}

  /* card */
  .card{background:var(--canvas); border-radius:var(--radius); padding:24px; box-shadow:var(--shadow);
    margin-bottom:24px}
  .card-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; gap:12px}
  .card-head h3{font-size:17px; font-weight:700; letter-spacing:-.01em}
  .card-head .hint{font-size:12.5px; color:var(--gray2)}
  .grid2{display:grid; grid-template-columns:1.15fr .85fr; gap:24px; align-items:start}
  .grid2.even{grid-template-columns:1fr 1fr; align-items:stretch}
  .grid2.even>.card{display:flex; flex-direction:column; min-height:300px}
  .grid2.even .chart-wrap{flex:1; display:flex; align-items:center}
  .grid2.even .donut-hold{flex:1; display:flex; align-items:center; justify-content:center}

  /* chart */
  .chart-wrap{width:100%; overflow-x:auto}
  svg{display:block; max-width:100%}
  .bar-row{margin-bottom:11px}
  .bar-meta{display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px}

  .bar-meta .ct{font-weight:700; color:var(--ink)}
  .bar-track{height:10px; background:var(--surface); border-radius:6px; overflow:hidden}
  .bar-fill{height:100%; border-radius:6px; background:linear-gradient(90deg,var(--blue),#4a9bff);
    transition:width .5s cubic-bezier(.22,1,.36,1)}

  /* table */
  table{width:100%; border-collapse:collapse; font-size:14px}
  th{text-align:left; font-size:12px; font-weight:700; color:var(--gray); letter-spacing:.02em;
    padding:11px 12px; border-bottom:1px solid var(--line); white-space:nowrap}
  th.num,td.num{text-align:right}
  td{padding:9px 12px; border-bottom:1px solid var(--line-soft); vertical-align:middle}
  tr:last-child td{border-bottom:none}
  .emp-name{font-weight:600}
  .count-input{width:74px; text-align:right; font-family:inherit; font-size:14px; font-weight:600;
    padding:7px 9px; border:1px solid var(--line); border-radius:9px; background:var(--surface2);
    color:var(--ink); transition:.15s}
  .count-input:focus{outline:none; border-color:var(--blue); background:#fff; box-shadow:0 0 0 3px var(--blue-soft)}
  tfoot td{font-weight:700; border-top:2px solid var(--line); padding-top:13px}
  .rank{display:inline-flex; width:22px; height:22px; align-items:center; justify-content:center;
    border-radius:7px; background:var(--surface); font-size:12px; font-weight:700; color:var(--gray)}

  /* VOC */
  .empty-note{text-align:center; color:var(--gray2); font-size:14px; padding:34px 0}
  .prog{display:flex; height:12px; background:var(--surface); border-radius:8px; overflow:hidden}
  .prog-fill{height:100%; transition:width .5s cubic-bezier(.22,1,.36,1)}
  .quote-card{border-radius:12px; padding:12px 14px; margin-bottom:10px}
  .quote-card.neg{background:var(--red-soft); border-left:3px solid var(--red)}
  .quote-card.pos{background:var(--green-soft); border-left:3px solid var(--green)}
  .quote-text{font-size:13.5px; line-height:1.55; color:var(--ink-soft); font-style:italic}
  .quote-meta{font-size:11.5px; color:var(--gray2); margin-top:6px; font-weight:600}
  .voc-reason{font-size:12.5px; line-height:1.5; margin:2px 0; color:var(--ink-soft)}

    padding:1px 7px; border-radius:6px; margin-right:5px; white-space:nowrap}

    font-size:12px; padding:2px 9px; border-radius:7px}

  .praise-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(268px,1fr)); gap:14px}
  .praise-card{border:1px solid var(--line-soft); border-left:4px solid var(--green); border-radius:16px;
    padding:15px 17px; background:linear-gradient(180deg,#f4fdf7,#fafafa); display:flex; flex-direction:column; gap:11px;
    box-shadow:0 1px 3px rgba(0,0,0,.04)}

    line-height:1; padding:0 2px; font-weight:700; border-radius:6px}

  .praise-quote{font-size:13.5px; line-height:1.6; color:var(--ink-soft); font-style:italic;
    border-left:2px solid #bbf7d0; padding-left:10px}
  .praise-foot{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:auto; flex-wrap:wrap}
  .praise-mid{font-size:11px; color:var(--gray2)}
  .praise-sel{font-family:inherit; font-size:12.5px; font-weight:600; padding:7px 10px; border:1px solid var(--line);
    border-radius:9px; background:#fff; color:var(--ink); cursor:pointer}
  .praise-sel:focus{outline:none; border-color:var(--green); box-shadow:0 0 0 3px var(--green-soft)}
  .voc-rawind{font-size:11px; color:var(--gray2); margin-top:2px}
  .voc-donedate{font-size:11px; color:#1e40af; font-weight:800; margin-top:2px}
  .vday-grid{display:flex; flex-wrap:wrap; gap:8px}

  .vday.has{background:#e8f0fe; border-color:#c7dbff}
  .vday-n{font-size:19px; font-weight:800; color:var(--gray2); line-height:1}
  .vday.has .vday-n{color:#1a56db}
  .vday-d{font-size:11px; color:var(--gray2); margin-top:4px}
  .voc-rawtxt{font-size:12px; color:var(--ink-soft); line-height:1.45}
  .voc-table td{vertical-align:top}
  .voc-stat{font-weight:700}
  .voc-stat.done{background:var(--green-soft); color:#166534; border-color:#bbf7d0}
  .voc-stat.hold{background:#fff4d6; color:#a8620a; border-color:#ffe1a8}
  /* 상태별 색상: 처리중=회색·처리완료=파랑·OB필요없음=초록·부재=빨강·통화거부=주황 */

  .voc-stat.st-reject{background:#ffedd5; color:#c2410c; border-color:#fed7aa}

  .voc-drill summary::-webkit-details-marker{display:none}

  .vd-cnt{flex:0 0 auto; font-size:13px; font-weight:800; color:var(--gray)}

  .vd-store{font-size:14px; font-weight:800; color:var(--ink)}

  .vd-score{font-size:11.5px; font-weight:700; color:var(--red); background:var(--red-soft); padding:1px 8px; border-radius:20px}

  .vd-stat.hold{background:#fff4d6; color:#a8620a}
  .vd-stat.st-progress{background:#eef1f4; color:#475569}
  .vd-stat.st-done{background:#dbeafe; color:#1e40af}
  .vd-stat.st-ob{background:var(--green-soft); color:#166534}
  .vd-stat.st-absent{background:#ffe1de; color:#b91c1c}
  .vd-stat.st-reject{background:#ffedd5; color:#c2410c}
  .vd-content,.vd-note{font-size:13px; color:var(--ink-soft); line-height:1.5}

  /* 저점율 행 (사용기간/VAN) */

  .day-badge{display:inline-block; font-size:11px; font-weight:800; padding:2px 8px; border-radius:20px; background:var(--surface2); color:var(--gray); white-space:nowrap}
  .day-badge.today{background:var(--blue-soft); color:var(--blue)}

  .cnt-badge.done{background:var(--green-soft); color:#166534}
  .voc-sel,.voc-note{width:100%; font-family:inherit; font-size:12.5px; padding:6px 8px; border:1px solid var(--line);

  /* pending lookup */
  .search-box{width:100%; font-family:inherit; font-size:14px; padding:11px 14px; border:1px solid var(--line);

  /* mini trend bars in table */

  /* ===== Duty calendar ===== */
  .cal-toolbar{display:flex; align-items:center; gap:14px; margin-bottom:20px}

  .navround{width:38px; height:38px; border-radius:50%; border:1px solid var(--line); background:var(--canvas);

  .slot-tag.inst{background:#d6f5e3; color:#1a7d47}
  .slot-field{flex:1; min-width:0; font-size:12.5px; padding:5px 7px; border:1px solid transparent;

  .slot-field:empty::before{content:"이름 입력"; color:var(--gray2)}
  .slot-field:focus{outline:none; border-color:var(--blue); background:#fff; box-shadow:0 0 0 3px var(--blue-soft);
    white-space:normal}

  /* ===== Share calendar ===== */
  .sel{font-family:inherit; font-size:14px; padding:9px 13px; border:1px solid var(--line);

  .daycell.share{min-height:172px; gap:6px}
  .daycell.share .dnum{justify-content:space-between; width:100%}
  .add-ev{margin-left:auto; width:20px; height:20px; border-radius:6px; border:none; cursor:pointer;
    background:var(--surface); color:var(--gray); font-size:15px; line-height:1; font-weight:700;
    display:inline-flex; align-items:center; justify-content:center; transition:.15s}
  .add-ev:hover{background:var(--blue); color:#fff}
  .ev-list{display:flex; flex-direction:column; gap:5px; overflow:hidden}
  .ev-chip{display:flex; align-items:flex-start; gap:6px; font-size:13px; font-weight:700; padding:7px 8px 7px 10px;
    border-radius:10px; line-height:1.4; color:#fff; box-shadow:0 1px 2px rgba(0,0,0,.12); transition:.15s}
  .ev-chip:hover{filter:brightness(1.08)}
  .ev-chip{cursor:grab}
  .ev-chip:active{cursor:grabbing}
  .ev-chip.dragging{opacity:.4}
  .daycell.share.drop-hover{border:2px dashed var(--blue); background:var(--blue-soft)}
  .ev-dot{width:7px; height:7px; border-radius:50%; flex:0 0 auto; margin-top:3px; display:inline-block}
  .ev-txt{flex:1; min-width:0; display:flex; flex-direction:column; gap:2px; white-space:normal; word-break:keep-all; color:#fff}
  .ev-head{font-weight:800; font-size:14px; letter-spacing:-.01em}
  .ev-sub{font-weight:700; font-size:12px; opacity:.95}
  .ev-time{font-weight:700; opacity:.95}
  .ev-memo{font-weight:600; font-size:11.5px; opacity:.9}
  .ev-del{flex:0 0 auto; border:none; background:transparent; color:#fff; cursor:pointer;
    font-size:15px; line-height:1; opacity:.7; padding:0 1px; margin-top:-1px; font-weight:700}
  .ev-del:hover{opacity:1}
  .ev-chip.gcal{background:#e8f0fe; color:#174ea6; border:1px solid #c6dafc; box-shadow:none; cursor:default}
  .ev-chip.gcal .ev-txt{color:#174ea6}
  .ev-chip.gcal .ev-sub{opacity:.85}
  .ev-gtag{flex:0 0 auto; width:18px; height:18px; border-radius:5px; background:#1a73e8; color:#fff;
    font-size:11px; font-weight:800; display:inline-flex; align-items:center; justify-content:center; margin-top:1px}
  .ev-chip.gcal.duty{border-color:#ffd8a8; background:#fff8ef}
  .ev-duty{display:block; font-size:11.5px; font-weight:800; color:#b45309; background:#fff3d6; border-radius:5px; padding:1px 6px; margin-top:3px; align-self:flex-start}
  /* 원격 근무 당번 카드 */
  .duty-remote-card .card-head{align-items:center}
  .dr-list{display:flex; flex-direction:column; gap:7px}
  .dr-row{display:flex; align-items:center; gap:10px; padding:9px 12px; border:1px solid var(--line-soft); border-radius:10px; background:var(--surface2)}

  .dr-title{flex:1; font-size:14px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .dr-person{flex:0 0 auto; display:inline-flex; align-items:center; gap:4px; font-size:13.5px; font-weight:800; color:#b45309; background:#fff3d6; padding:2px 6px 2px 10px; border-radius:20px}

  .dr-sel:hover{background:rgba(180,83,9,.12)}

  .dr-reset{border:none; background:transparent; color:#b45309; cursor:pointer; font-size:13px; font-weight:800; padding:0 3px; opacity:.7}

  /* 30분 전 당번 팝업 */
  .duty-pop-overlay{position:fixed; inset:0; background:rgba(15,15,15,.55); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; z-index:9999; animation:dutyfade .2s ease}

  .duty-pop{background:var(--canvas,#fff); border-radius:22px; padding:30px 34px; text-align:center; max-width:340px; width:88%;

  .duty-pop-ic{font-size:52px; line-height:1}
  .duty-pop-sub{margin-top:8px; font-size:13px; font-weight:800; color:#ff9500; letter-spacing:.02em}
  .duty-pop-title{margin-top:3px; font-size:20px; font-weight:800; color:var(--ink); letter-spacing:-.02em}
  .duty-pop-badge{margin-top:18px; font-size:12px; font-weight:700; color:var(--gray)}
  .duty-pop-person{margin-top:3px; font-size:36px; font-weight:800; letter-spacing:-.03em; color:#b45309}
  .duty-pop-time{margin-top:8px; font-size:14px; color:var(--gray)}
  .duty-pop-btn{margin-top:22px; width:100%; border:none; background:var(--blue,#1f4ffa); color:#fff; font-size:15px; font-weight:700; padding:13px; border-radius:13px; cursor:pointer}
  .duty-pop-btn:hover{filter:brightness(1.06)}

  /* form modal */
  .form-modal{text-align:left; width:min(440px,92vw)}
  .form-modal h4{text-align:center}
  .form-row{display:flex; align-items:center; gap:12px; margin-bottom:12px}
  .form-row label{flex:0 0 56px; font-size:13px; font-weight:700; color:var(--gray)}
  .form-row input, .form-row select{flex:1; font-family:inherit; font-size:14px; padding:9px 11px;
    border:1px solid var(--line); border-radius:10px; background:var(--surface2); color:var(--ink)}
  .form-row input:focus, .form-row select:focus{outline:none; border-color:var(--blue); background:#fff;
    box-shadow:0 0 0 3px var(--blue-soft)}
  .time-range{flex:1; display:flex; align-items:center; gap:8px}
  .time-range select{flex:1; min-width:0}
  .time-range .tilde{color:var(--gray); font-weight:700}

  /* ===== Lock / Login (참신 경고성) ===== */
  .lock{position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(120% 120% at 50% 0%,#14e0cf 0%,#00a3ff 42%,#0057d9 100%);
    padding:24px; overflow:hidden; transition:opacity .4s ease}
  .lock.hide{opacity:0; pointer-events:none}
  .float-emoji{position:absolute; font-size:56px; opacity:.22; user-select:none; pointer-events:none;
    filter:drop-shadow(0 6px 12px rgba(0,0,0,.15)); animation:floaty 7s ease-in-out infinite}
  .float-emoji.e1{top:12%; left:12%; animation-delay:0s}
  .float-emoji.e2{top:20%; right:14%; font-size:48px; animation-delay:1.2s}
  .float-emoji.e3{bottom:16%; left:16%; font-size:44px; animation-delay:2.1s}
  .float-emoji.e4{bottom:20%; right:12%; animation-delay:.6s}
  @keyframes floaty{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-22px) rotate(6deg)}}

  .lock-card{position:relative; background:var(--canvas); border-radius:30px; padding:40px 38px 30px;
    width:min(440px,93vw); text-align:center; box-shadow:0 30px 90px rgba(0,40,90,.45);
    animation:cardPop .5s cubic-bezier(.22,1.2,.36,1)}
  @keyframes cardPop{0%{transform:scale(.9) translateY(14px); opacity:0}100%{transform:scale(1) translateY(0); opacity:1}}

  .lock-badge{display:inline-flex; align-items:center; gap:6px; background:#fff4d6; color:#a8620a;
    font-size:12.5px; font-weight:800; letter-spacing:-.01em; padding:7px 14px; border-radius:20px;
    margin-bottom:20px; animation:badgePulse 1.6s ease-in-out infinite}
  @keyframes badgePulse{0%,100%{box-shadow:0 0 0 0 rgba(255,149,0,.35)}50%{box-shadow:0 0 0 8px rgba(255,149,0,0)}}

  .logo-wrap{position:relative; display:inline-flex; align-items:center; justify-content:center; margin-bottom:14px}
  .pulse-ring{position:absolute; width:96px; height:96px; border-radius:26px; background:#00a3ff;
    opacity:.35; animation:ring 1.8s ease-out infinite}
  @keyframes ring{0%{transform:scale(.85); opacity:.4}100%{transform:scale(1.5); opacity:0}}
  .logo-tile{position:relative; width:88px; height:88px; border-radius:24px;
    background:linear-gradient(145deg,#19e3d0 0%,#00a3ff 55%,#0071e3 100%);
    display:flex; align-items:center; justify-content:center; box-shadow:0 12px 26px rgba(0,120,220,.45);
    animation:wobble 2.6s ease-in-out infinite}
  @keyframes wobble{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
  .logo-s{font-size:52px; font-weight:900; color:#fff; letter-spacing:-.04em; font-style:italic;
    text-shadow:0 2px 6px rgba(0,0,0,.18)}
  .lock-wordmark{font-size:15px; font-weight:800; color:var(--ink); letter-spacing:-.01em; margin-bottom:18px}
  .lock-wordmark span{color:var(--gray2); font-weight:600}

  .lock-q{font-size:30px; font-weight:800; letter-spacing:-.03em; color:var(--ink); line-height:1.22; margin-bottom:12px}
  .lock-q em{font-style:normal; color:#0071e3; position:relative}
  .lock-q em::after{content:''; position:absolute; left:-2px; right:-2px; bottom:2px; height:9px;
    background:rgba(0,163,255,.22); border-radius:4px; z-index:-1}
  .wave{display:inline-block; animation:wave 1.4s ease-in-out infinite; transform-origin:70% 80%}
  @keyframes wave{0%,60%,100%{transform:rotate(0)}15%{transform:rotate(20deg)}30%{transform:rotate(-12deg)}45%{transform:rotate(16deg)}}

  .lock-desc{font-size:14.5px; color:var(--gray); line-height:1.6; margin-bottom:20px}
  .lock-desc b{color:var(--ink); font-weight:800}
  .lock-input{width:100%; font-family:inherit; font-size:17px; font-weight:600; text-align:center; padding:15px 16px;
    border:2px solid var(--line); border-radius:15px; background:var(--surface2); color:var(--ink); transition:.15s}
  .lock-input:focus{outline:none; border-color:#00a3ff; background:#fff; box-shadow:0 0 0 4px rgba(0,163,255,.18)}
  .lock-input.shake{animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}
  .lock-err{min-height:20px; font-size:13px; font-weight:700; color:var(--red); margin:10px 0 2px}
  .lock-btn{width:100%; padding:16px; font-size:16px; font-weight:800; letter-spacing:-.01em; border:none;
    border-radius:15px; color:#fff; cursor:pointer; font-family:inherit; margin-top:6px;
    background:linear-gradient(135deg,#00b3e6,#0071e3); box-shadow:0 10px 24px rgba(0,113,227,.4); transition:.15s}
  .lock-btn:hover{filter:brightness(1.06); transform:translateY(-1px)}
  .lock-btn:active{transform:translateY(0)}
  .lock-foot{font-size:12px; color:var(--gray2); font-weight:600; margin-top:18px}

  /* alert modal */
  .overlay{position:fixed; inset:0; background:rgba(0,0,0,.32); backdrop-filter:blur(3px);
    display:flex; align-items:center; justify-content:center; z-index:50; opacity:0; pointer-events:none;
    transition:opacity .25s}
  .overlay.show{opacity:1; pointer-events:auto}
  .modal{background:var(--canvas); border-radius:22px; padding:30px 32px; width:min(420px,90vw);
    box-shadow:0 20px 60px rgba(0,0,0,.25); text-align:center; transform:scale(.94); transition:transform .25s}
  .overlay.show .modal{transform:scale(1)}
  .modal .bell{font-size:40px; margin-bottom:12px}
  .modal h4{font-size:20px; font-weight:700; letter-spacing:-.02em; margin-bottom:8px}

  .modal .names{font-weight:700; color:var(--blue)}
  .modal .date-line{font-size:13px; color:var(--gray2); margin-top:6px}
  .modal .acts{margin-top:22px; display:flex; gap:10px; justify-content:center}

  .legend{display:flex; gap:16px; flex-wrap:wrap; font-size:12.5px; color:var(--gray); margin-top:16px}
  .legend span{display:inline-flex; align-items:center; gap:6px}
  .swatch{width:12px; height:12px; border-radius:4px; display:inline-block}

  @media (max-width:900px){
    .sidebar{display:none}
    .main{padding:22px 18px 48px}
    .kpis{grid-template-columns:repeat(2,1fr)}
    .ov-tiles{grid-template-columns:repeat(2,1fr)}

    .grid2{grid-template-columns:1fr}
    .cal-grid{gap:4px}
    .daycell{min-height:auto; padding:6px}
  }
</style>
</head>
<body>

<!-- Lock / Login screen -->
<div class="lock" id="lock">
  <span class="float-emoji e1">⏰</span>
  <span class="float-emoji e2">🖐️</span>
  <span class="float-emoji e3">✅</span>
  <span class="float-emoji e4">⏰</span>
  <div class="lock-card">
    <div class="lock-badge">⚠️ 대시보드 입장 전 필수 체크</div>
    <div class="lock-wordmark">Shifty <span>· 출근 체크</span></div>
    <h3 class="lock-q">아 맞다,<br><em>시프티</em> 찍으셨나요? <span class="wave">🖐️</span></h3>
    <p class="lock-desc">확인하셨다면 아래에 답변을 입력하고 입장하세요.</p>
    <input type="text" id="lockInput" class="lock-input" placeholder="답변을 입력하세요"
      autocomplete="off" onkeydown="if(event.key==='Enter') submitLogin()">
    <div class="lock-err" id="lockErr"></div>
    <button class="lock-btn" onclick="submitLogin()">입장하기</button>
    <div class="lock-foot">Offline Care Team · 원격파트 대시보드</div>
  </div>
</div>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="brand">
    <h1>원격파트 대시보드</h1>
    <p>iShopCare</p>
  </div>
  <div class="nav-label">카테고리</div>
  <nav id="nav"></nav>
  <button class="lock-out" onclick="relock()">🔒 잠금</button>
</aside>

<!-- Main -->
<main class="main" id="main"></main>

<!-- Duty alert modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="bell">🔔</div>
    <h4>당직근무 알림</h4>
    <p id="modalText"></p>
    <div class="date-line" id="modalDate"></div>
    <div class="acts">
      <button class="btn primary" onclick="closeModal()">확인</button>
    </div>
  </div>
</div>

<!-- Share event form modal -->
<div class="overlay" id="shareOverlay">
  <div class="modal form-modal">
    <h4 id="sfHeading" style="margin-bottom:18px">일정 공유 추가</h4>
    <div class="form-row"><label id="sfDateLabel">날짜</label><input type="date" id="sfDate"></div>
    <div class="form-row" id="sfEndDateRow" style="display:none"><label>종료일</label><input type="date" id="sfEndDate"></div>
    <div class="form-row"><label>직원</label>
      <select id="sfEmp"></select></div>
    <div class="form-row"><label>유형</label>
      <select id="sfType" onchange="onShareTypeChange()"></select></div>
    <div class="form-row" id="sfTimeRow"><label>시간</label>
      <div class="time-range">
        <select id="sfStart"></select>
        <span class="tilde">~</span>
        <select id="sfEnd"></select>
      </div></div>
    <div class="form-row"><label>내용</label><input type="text" id="sfTitle" placeholder="예: 거래처 미팅 (선택)"></div>
    <div class="acts">
      <button class="btn" onclick="closeShareForm()">취소</button>
      <button class="btn primary" id="sfSubmit" onclick="submitShare()">추가</button>
    </div>
  </div>
</div>

<!-- 슬랙 집계 데이터는 캐시 무효화하여 아래 스크립트에서 동적 로드 -->
<script>
/* ================= Config ================= */
const EMPLOYEES = ["김기범","서상원","김규빈","김동욱","송태양","김현기","배선유","최민석","심성현"];
// 공유 캘린더 — 직원별 고유 색상(흰 글씨가 잘 보이는 진한 톤)
const EMP_COLORS = {
  "김기범":"#1f6feb","서상원":"#2f9e44","김규빈":"#e8590c","김동욱":"#6741d9",
  "송태양":"#e03131","김현기":"#0c8599","배선유":"#9c36b5","최민석":"#c2255c","심성현":"#495057"

function ymd(d){ const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${dd}`; }
function parseYmd(s){ const [y,m,dd]=s.split("-").map(Number); return new Date(y,m-1,dd); }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function startOfWeek(d){ const x=new Date(d); const dow=(x.getDay()+6)%7; return addDays(x,-dow); } // 월요일 시작
function fmtKDate(d){ const w=["일","월","화","수","목","금","토"][d.getDay()];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${w})`; }
function fmtShort(s){ const d=parseYmd(s); return `${d.getMonth()+1}/${d.getDate()}`; }
// 공용 기간 헬퍼 (어제/오늘/최근N일/기간)
function lastNDays(n){ const out=[]; for(let i=n-1;i>=0;i--) out.push(ymd(addDays(today(),-i))); return out; }
function dateRangeList(s,e){ let a=parseYmd(s), b=parseYmd(e); if(b<a){const t=a;a=b;b=t;} const out=[]; for(let d=new Date(a); d<=b; d=addDays(d,1)) out.push(ymd(d)); return out; }
function periodDates(mode, cStart, cEnd){
  if(mode==='yesterday') return [ymd(addDays(today(),-1))];
  if(mode==='d7') return lastNDays(7);
  if(mode==='d30') return lastNDays(30);
  if(mode==='range'||mode==='custom') return dateRangeList(cStart, cEnd);
  return [ymd(today())]; // today
}
function periodRangeText(dates){ if(!dates.length) return ''; return dates.length===1?fmtShort(dates[0]):`${fmtShort(dates[0])} ~ ${fmtShort(dates[dates.length-1])} (${dates.length}일)`; }

function setCount(cat, date, emp, n){
  if(!COUNTS[cat]) COUNTS[cat]={};
  if(!COUNTS[cat][date]) COUNTS[cat][date]={};
  if(n>0) COUNTS[cat][date][emp]=n; else delete COUNTS[cat][date][emp];
  save(LS_COUNT, COUNTS);

function rangeDates(mode, refStr){
  if(mode==="custom"){
    const out=[]; let s=parseYmd(rangeStart), e=parseYmd(rangeEnd);
    if(e<s){ const t=s; s=e; e=t; }               // 뒤집혀 선택돼도 정상 처리
    for(let d=new Date(s); d<=e; d=addDays(d,1)) out.push(ymd(d));
    return out;
  }
  const ref = parseYmd(refStr); const out=[];
  if(mode==="day"){ out.push(refStr); }
  else if(mode==="week"){ const s=startOfWeek(ref); for(let i=0;i<7;i++) out.push(ymd(addDays(s,i))); }
  else { const y=ref.getFullYear(), m=ref.getMonth(), last=new Date(y,m+1,0).getDate();
    for(let i=1;i<=last;i++) out.push(ymd(new Date(y,m,i))); }
  return out;
}

function pickCoinAmount(){ const T=[{w:50000,a:1,b:5},{w:25000,a:6,b:20},{w:15000,a:21,b:80},{w:7000,a:81,b:200},{w:2500,a:201,b:500},{w:490,a:501,b:999},{w:1,a:1000,b:1000}]; const tot=T.reduce((s,t)=>s+t.w,0); let r=Math.random()*tot; for(const t of T){ if((r-=t.w)<0) return randInt(t.a,t.b); } return 1; }

function castFish(spot){

function fishItemPreview(spot){ const seen={}, items=[]; FISH[spot].loot.filter(x=>x.t==='item').forEach(x=>{ for(const cat in GAME_ITEMS){ for(const it of GAME_ITEMS[cat]){ if(it.price===0) continue; if(!x.rar.includes(it.rarity)) continue; if(x.fish&&!it.fishOnly) continue; if(!x.fish&&it.fishOnly) continue; const k=cat+':'+it.id; if(!seen[k]){ seen[k]=1; items.push(Object.assign({cat},it)); } } } }); const ord={mythic:0,legendary:1,epic:2,rare:3,common:4}; return items.sort((a,b)=>(ord[a.rarity]-ord[b.rarity])); }

// 전체 처리 추이 (기간 내 일별 전 카테고리 합계)
function overviewTrend(dates){
  const vocDB=vocDoneByDay();
  const vals=dates.map(d=>{ const vp=vocDB[d]||0; const ab=((slackDay(d)||{}).pending||[]).filter(p=>(p.reasons||[]).some(r=>/부재/.test(r))).length; return WORK_CATS.reduce((a,c)=>a+sumRange(c.key,[d]),0)+vp+ab; });   // 업무 + VOC 처리(완료일 기준) + 부재 미처리 = 원격 총 건수와 동일 기준
  const mx=Math.max(1,...vals);
  const gapUnit=Math.min(60,Math.max(28,720/dates.length));
  const W=Math.max(520,dates.length*gapUnit), H=200, pad=26, gap=(W-pad*2)/dates.length, bw=gap*0.6;
  const many=dates.length>16;
  const bars=dates.map((d,i)=>{ const v=vals[i], h=(H-46)*(v/mx), x=pad+i*gap+(gap-bw)/2, y=H-28-h, dd=parseYmd(d), isT=d===ymd(today());
    const lbl=many?dd.getDate():`${dd.getMonth()+1}/${dd.getDate()}`;
    return `<rect x="${x}" y="${y.toFixed(1)}" width="${bw}" height="${h.toFixed(1)}" rx="4" fill="${isT?'var(--blue)':'#cfe3fb'}"></rect>`
      +(v>0?`<text x="${x+bw/2}" y="${(y-5).toFixed(1)}" text-anchor="middle" font-size="10.5" font-weight="700" fill="#424245">${v}</text>`:'')
      +`<text x="${x+bw/2}" y="${H-11}" text-anchor="middle" font-size="9.5" fill="#86868b">${lbl}</text>`;}).join('');
  return `<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}"><line x1="${pad}" y1="${H-28}" x2="${W-pad}" y2="${H-28}" stroke="var(--line)"/>${bars}</svg></div>`;
}
// 도넛 차트
function donutChart(entries){
  const total=entries.reduce((a,e)=>a+e[1],0);
  if(!total) return '<div class="empty-note">데이터 없음</div>';
  const cx=72,cy=72,rm=50,C=2*Math.PI*rm,sw=22; let acc=0;
  const segs=entries.map(([label,val,color])=>{ const len=val/total*C; const s=`<circle cx="${cx}" cy="${cy}" r="${rm}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}" stroke-dashoffset="${(-acc).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"><title>${label} ${val} (${Math.round(val/total*100)}%)</title></circle>`; acc+=len; return s; }).join('');
  const legend=entries.map(([label,val,color])=>`<span><span class="swatch" style="background:${color}"></span>${label} ${val} (${Math.round(val/total*100)}%)</span>`).join('');
  return `<div style="display:flex;gap:22px;align-items:center;flex-wrap:wrap">

}

// 직원별 그룹(묶음) 세로 막대차트 — 직원마다 카테고리별 막대를 분리 표시
function columnChart(empRows, maxCell){
  const cats=WORK_CATS, nc=cats.length, ng=empRows.length;
  const barW=12, barGap=3, groupGap=32, padL=20, padR=20, topPad=22, botPad=46;
  const groupW=nc*barW+(nc-1)*barGap;
  const W=Math.max(560, padL+padR + ng*groupW + (ng-1)*groupGap);
  const H=340, base=H-botPad, plotH=H-topPad-botPad;
  const mx=Math.max(1, maxCell);
  const groups=empRows.map((r,gi)=>{
    const gx=padL + gi*(groupW+groupGap);
    const bars=cats.map((c,ci)=>{
      const v=r.cells[ci];
      const bx=gx+ci*(barW+barGap);
      if(v<=0) return `<rect x="${bx}" y="${base-2}" width="${barW}" height="2" rx="1" fill="#ececf0"/>`;
      const h=v/mx*plotH, y=base-h;
      return `<rect x="${bx}" y="${y.toFixed(1)}" width="${barW}" height="${h.toFixed(1)}" rx="2.5" fill="${c.color}"><title>${r.emp} · ${c.name} ${v}건</title></rect>`
        + `<text x="${bx+barW/2}" y="${(y-4).toFixed(1)}" text-anchor="middle" font-size="10" font-weight="700" fill="#424245">${v}</text>`;
    }).join("");
    const sep = gi>0 ? `<line x1="${(gx-groupGap/2).toFixed(1)}" y1="${topPad}" x2="${(gx-groupGap/2).toFixed(1)}" y2="${base}" stroke="#f2f2f5"/>` : "";
    const name = `<text x="${gx+groupW/2}" y="${base+22}" text-anchor="middle" font-size="13" font-weight="700" fill="#1d1d1f">${r.emp}</text>`;
    const tot = `<text x="${gx+groupW/2}" y="${base+38}" text-anchor="middle" font-size="11" font-weight="600" fill="#86868b">합계 ${r.total}</text>`;
    return sep+bars+name+tot;
  }).join("");
  return `<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
    <line x1="${padL-8}" y1="${base}" x2="${W-padR+8}" y2="${base}" stroke="#d2d2d7"/>
    ${groups}
  </svg></div>`;
}
// 단일 카테고리 세로 막대차트 (직원별) — 외주 등
function simpleColumn(pairs, color){

// 기간 내 VOC 집계 합산
function aggVoc(dates){
  const agg={responses:0,install:{count:0,low:0},nps:{count:0,low:0},high:{install:0,nps:0},npsDist:{},installDist:{},byIndustry:{},byTenure:{},byVan:{},reasonCounts:{},alerts:[],praises:[]};
  const mergePair=(dst,src)=>{ for(const k in (src||{})){ if(!dst[k])dst[k]={total:0,low:0}; dst[k].total+=src[k].total||0; dst[k].low+=src[k].low||0; } };
  dates.forEach(d=>{ const v=(slackDay(d)||{}).voc; if(!v) return;
    agg.responses+=v.responses||0;
    if(v.install){agg.install.count+=v.install.count||0; agg.install.low+=v.install.low||0;}
    if(v.nps){agg.nps.count+=v.nps.count||0; agg.nps.low+=v.nps.low||0;}
    if(v.high){agg.high.install+=v.high.install||0; agg.high.nps+=v.high.nps||0;}
    for(const k in (v.npsDist||{})) agg.npsDist[k]=(agg.npsDist[k]||0)+v.npsDist[k];
    for(const k in (v.installDist||{})) agg.installDist[k]=(agg.installDist[k]||0)+v.installDist[k];
    for(const k in (v.byIndustry||{})) agg.byIndustry[k]=(agg.byIndustry[k]||0)+v.byIndustry[k];
    for(const k in (v.reasonCounts||{})) agg.reasonCounts[k]=(agg.reasonCounts[k]||0)+v.reasonCounts[k];
    mergePair(agg.byTenure, v.byTenure); mergePair(agg.byVan, v.byVan);
    (v.alerts||[]).forEach(a=>agg.alerts.push(Object.assign({date:d},a)));
    (v.praises||[]).forEach(p=>agg.praises.push(Object.assign({date:d},p)));
  });
  return agg;
}
// NPS 지표 계산
function vocNpsStats(dist){
  let total=0,prom=0,pass=0,det=0,sum=0;
  for(const k in dist){ const s=+k,c=dist[k]; total+=c; sum+=s*c; if(s>=9)prom+=c; else if(s>=7)pass+=c; else det+=c; }
  return {total,prom,pass,det, nps: total?Math.round((prom-det)/total*100):0, avg: total?(sum/total):0};
}
function avgScore(dist){ let t=0,s=0; for(const k in dist){t+=dist[k]; s+=(+k)*dist[k];} return t?(s/t):0; }
// 점수 분포 세로 막대
function distColumnChart(dist, maxScore, colorFn){
  const scores=[]; for(let i=0;i<=maxScore;i++) scores.push(i);
  const counts=scores.map(s=>dist[s]||0), mx=Math.max(1,...counts);
  const n=scores.length, bw=Math.max(20,Math.min(46,Math.floor(560/n))-8), gap=10, padL=16,padR=16,H=160,base=H-28,plotH=H-44;
  const W=Math.max(360, padL+padR+n*(bw+gap));
  const bars=scores.map((s,i)=>{const c=counts[i],h=c/mx*plotH,x=padL+i*(bw+gap),y=base-h;
    return `<rect x="${x}" y="${y.toFixed(1)}" width="${bw}" height="${h.toFixed(1)}" rx="3" fill="${colorFn(s)}"></rect>`
      +(c>0?`<text x="${x+bw/2}" y="${(y-4).toFixed(1)}" text-anchor="middle" font-size="10" font-weight="700" fill="#424245">${c}</text>`:'')
      +`<text x="${x+bw/2}" y="${base+15}" text-anchor="middle" font-size="10.5" font-weight="600" fill="#86868b">${s}</text>`;}).join('');
  return `<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}"><line x1="${padL-4}" y1="${base}" x2="${W-padR+4}" y2="${base}" stroke="#d2d2d7"/>${bars}</svg></div>`;
}

      <summary><span class="vd-name">${escapeHtml(name.split('(')[0])}</span><span class="vd-bar"><span class="vd-fill" style="width:${cnt/max*100}%;background:${color}"></span></span><span class="vd-cnt">${cnt}건</span></summary>

function vocMonthNav(n){ const r=parseYmd(selDate); selDate=ymd(new Date(r.getFullYear(), r.getMonth()+n, 1)); renderVocMonthly(); }
function vocMonthToday(){ selDate=ymd(today()); renderVocMonthly(); }
function saveVocComment(mkey, text){ if(text&&text.trim()) VOCCOMMENT[mkey]=text; else delete VOCCOMMENT[mkey]; save(LS_VOCCOMMENT, VOCCOMMENT); }
function vocGenComment(mkey){
  const {v,byInd,byReason,totalIn}=vocMonthAgg();
  const ti=Object.entries(byInd).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const tr=Object.entries(byReason).sort((a,b)=>b[1]-a[1]).slice(0,3);
  let s=`[${mkey} VOC 먼슬리 요약]\n`;
  s+=`• 총 응답 ${v.responses}건 중 VOC 인입(저점) ${totalIn}건 (저점률 ${v.responses?Math.round(totalIn/v.responses*100):0}%)\n`;
  s+=`• 구매설치 저점 ${v.install.low}건 · 추천의향 저점 ${v.nps.low}건\n`;
  if(ti.length) s+=`• 업종: ${ti.map(([n,c])=>n+' '+c+'건').join(' / ')}\n`;
  if(tr.length) s+=`• 주요 사유: ${tr.map(([n,c])=>n.split('(')[0]+' '+c+'건').join(' / ')}\n`;
  s+=`• 인사이트/액션: `;
  const el=document.getElementById('vocComment'); if(el){ el.value=s; el.focus(); }
  saveVocComment(mkey, s);
}

function filterPending(q){
  q=(q||"").trim().toLowerCase();
  let shown=0;
  document.querySelectorAll("#pendingBody tr").forEach(tr=>{
    const hit=(tr.dataset.key||"").includes(q);
    tr.style.display=hit?"":"none";
    if(hit) shown++;
  });
  const emp=document.getElementById("pendingEmpty");
  if(emp) emp.style.display=shown===0?"block":"none";
}

function kpiCard(lab, val, prev, tag){
  const diff = val-prev;
  const cls = diff>0?"up":diff<0?"down":"flat";
  const arrow = diff>0?"▲":diff<0?"▼":"–";
  const pct = prev>0? Math.round(Math.abs(diff)/prev*100)+"%" : (val>0?"신규":"0%");
  return `<div class="kpi">
    <div class="lab">${lab}</div>
    <div class="val">${val}<small>건</small></div>
    <div class="delta ${cls}">${arrow} ${pct} <span style="color:var(--gray2);font-weight:500">${tag}</span></div>
  </div>`;
}

// 7일 스파크라인
function spark(cat,emp){
  const end=parseYmd(selDate); let vals=[];
  for(let i=6;i>=0;i--) vals.push(getCount(cat,ymd(addDays(end,-i)),emp));
  const mx=Math.max(1,...vals);
  return `<span class="spark">${vals.map(v=>{
    const h=Math.max(3, v/mx*22);
    return `<i class="${v===mx&&v>0?'hi':''}" style="height:${h}px"></i>`;}).join("")}</span>`;
}

// 기간 추이 막대 차트 (SVG)
function trendChart(cat, mode, ref){
  const dates = rangeDates(mode, ref);
  const vals = dates.map(d=> sumRange(cat,[d]));
  const mx = Math.max(1, ...vals);
  const gapUnit = Math.min(64, Math.max(30, 720/dates.length));
  const W=Math.max(560, dates.length*gapUnit);
  const H=220, pad=28, gap=(W-pad*2)/dates.length, bw=gap*0.6;
  const bars = dates.map((d,i)=>{
    const v=vals[i]; const h=(H-50)*(v/mx);
    const x=pad + i*gap + (gap-bw)/2, y=H-30-h;
    const dd=parseYmd(d); const isToday=d===ymd(today());
    const lbl = mode==="month"? (dd.getDate()) : `${dd.getMonth()+1}/${dd.getDate()}`;
    const col = isToday? "var(--blue)" : "#cfe3fb";
    return `<g>
      <rect x="${x}" y="${y}" width="${bw}" height="${h}" rx="4" fill="${col}"></rect>
      ${v>0?`<text x="${x+bw/2}" y="${y-6}" text-anchor="middle" font-size="11" font-weight="700" fill="#424245">${v}</text>`:''}
      <text x="${x+bw/2}" y="${H-12}" text-anchor="middle" font-size="10" fill="#86868b">${lbl}</text>
    </g>`;
  }).join("");
  const total = vals.reduce((a,b)=>a+b,0);
  return `<div class="chart-wrap">
    <svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
      <line x1="${pad}" y1="${H-30}" x2="${W-pad}" y2="${H-30}" stroke="var(--line)" stroke-width="1"></line>
      ${bars}
    </svg>
  </div>
  <div class="legend">
    <span><span class="swatch" style="background:var(--blue)"></span>오늘</span>
    <span><span class="swatch" style="background:#cfe3fb"></span>처리건수</span>
    <span style="margin-left:auto;font-weight:600;color:var(--ink)">기간 합계 ${total}건</span>
  </div>`;
}

function submitShare(){
  const ds=document.getElementById("sfDate").value;
  const emp=document.getElementById("sfEmp").value;
  const type=document.getElementById("sfType").value;
  const title=document.getElementById("sfTitle").value.trim();
  if(!ds||!emp) return;

  // 수정 모드면 기존 일정(단건) 먼저 제거
  let keepId=null;
  if(shareEdit){
    const src=SHARE[shareEdit.ds]||[];
    const idx=src.findIndex(e=>e.id===shareEdit.id);
    if(idx>=0){ keepId=src[idx].id; src.splice(idx,1); if(src.length===0) delete SHARE[shareEdit.ds]; }
  }

  if(type==="vacation"){
    // 휴가: 시작일~종료일 각 날짜에 하루씩 등록 (같은 grp 로 묶어 일괄 삭제 가능)
    let a=ds, b=document.getElementById("sfEndDate").value||ds;
    if(b<a){ const t=a; a=b; b=t; }
    const grp="v"+ds.replace(/-/g,'')+"_"+(Date.now()%100000);
    eachDate(a,b).forEach((d,i)=>{
      if(!SHARE[d]) SHARE[d]=[];
      SHARE[d].push({ id:grp+"_"+i, grp, emp, type, time:"", title });
    });
  } else {
    const s=document.getElementById("sfStart").value, e2=document.getElementById("sfEnd").value;
    let time="";
    if(s&&e2) time=`${s} ~ ${e2}`; else if(s) time=`${s} ~`; else if(e2) time=`~ ${e2}`;
    if(!SHARE[ds]) SHARE[ds]=[];
    SHARE[ds].push({ id: keepId || ("e"+ds.replace(/-/g,'')+"_"+SHARE[ds].length+"_"+emp.length), emp, type, time, title });

  shareEdit=null;
  save(LS_SHARE, SHARE);

// 시작~종료(YYYY-MM-DD) 사이 날짜 배열
function eachDate(a,b){
  const out=[]; let d=parseYmd(a);
  while(ymd(d)<=b){ out.push(ymd(d)); d.setDate(d.getDate()+1); if(out.length>366) break; }
  return out;
}
function timeOptions(){

      const v=`${String(h).padStart(2,'0')}:${mm}`;
      opts += `<option value="${v}">${v}</option>`;
    }

  return opts;

function removeShare(ds, id){
  if(!SHARE[ds]) return;
  const ev=SHARE[ds].find(e=>e.id===id); if(!ev) return;
  const t=typeMeta(ev.type);
  if(ev.grp){
    // 휴가(여러 날) → 그룹 전체 삭제
    let days=0; Object.values(SHARE).forEach(arr=>arr.forEach(e=>{ if(e.grp===ev.grp) days++; }));
    if(!confirm(`${ev.emp}님의 ${t.label}(${days}일) 전체를 삭제할까요?`)) return;
    Object.keys(SHARE).forEach(d=>{ SHARE[d]=SHARE[d].filter(e=>e.grp!==ev.grp); if(SHARE[d].length===0) delete SHARE[d]; });
  } else {
    if(!confirm(`${ev.emp}님의 ${t.label}${ev.title?' ('+ev.title+')':''} 일정을 삭제할까요?`)) return;
    SHARE[ds]=SHARE[ds].filter(e=>e.id!==id);
    if(SHARE[ds].length===0) delete SHARE[ds];
  }
  save(LS_SHARE, SHARE);
  renderShare();
}

/* ===== 드래그&드롭으로 일정 날짜 이동 ===== */
let shareDrag=null; // {ds, id}
function shareDragStart(ev, ds, id){
  shareDrag={ds, id};
  ev.dataTransfer.effectAllowed="move";
  try{ ev.dataTransfer.setData("text/plain", ds+"|"+id); }catch(e){}
  ev.currentTarget.classList.add("dragging");
}
function shareDragEnd(ev){ ev.currentTarget.classList.remove("dragging"); }
function shareDragOver(ev, cell){ ev.preventDefault(); ev.dataTransfer.dropEffect="move"; cell.classList.add("drop-hover"); }
function shareDragLeave(cell){ cell.classList.remove("drop-hover"); }
function shareDrop(ev, targetDs, cell){
  ev.preventDefault(); cell.classList.remove("drop-hover");
  let src=shareDrag;
  if(!src){ const d=(ev.dataTransfer.getData("text/plain")||"").split("|"); if(d.length===2) src={ds:d[0], id:d[1]}; }
  shareDrag=null;
  if(!src || src.ds===targetDs) return;           // 같은 날이면 무시
  const list=SHARE[src.ds]; if(!list) return;
  const idx=list.findIndex(e=>e.id===src.id); if(idx<0) return;
  const moved=list.splice(idx,1)[0];
  if(list.length===0) delete SHARE[src.ds];
  if(!SHARE[targetDs]) SHARE[targetDs]=[];
  SHARE[targetDs].push(moved);
  save(LS_SHARE, SHARE);
  renderShare();
}

/* ================= Duty alert (하루 전) ================= */
function checkDutyAlert(){
  const tomorrow=addDays(today(),1); const ds=ymd(tomorrow);
  const rec=DUTY[ds]; if(!rec) return;
  const names=[];
  if(rec.day) names.push(`${rec.day}님(주간)`);
  if(rec.aft) names.push(`${rec.aft}님(오후)`);
  if(rec.nit) names.push(`${rec.nit}님(야간)`);
  if(names.length===0) return;
  const flag="opcare_dutyalert_"+ymd(today());
  if(sessionStorage.getItem(flag)) return;
  sessionStorage.setItem(flag,"1");
  document.getElementById("modalText").innerHTML =
    `내일은 <span class="names">${names.join(", ")}</span> 당직근무일입니다.`;
  document.getElementById("modalDate").textContent = fmtKDate(tomorrow);
  document.getElementById("overlay").classList.add("show");
}
function closeModal(){ document.getElementById("overlay").classList.remove("show"); }

/* ================= Login / Lock ================= */
const LS_AUTH = "opcare_authed_v1";
const PASS = "시프티";
function checkAuth(){
  // 저장된 로그인 날짜가 '오늘'이면 통과, 날짜가 바뀌면 다시 로그인
  if(localStorage.getItem(LS_AUTH)===ymd(today())){
    document.getElementById("lock").classList.add("hide");
    checkDutyAlert();
  }else{
    const el=document.getElementById("lockInput");
    setTimeout(()=>el.focus(), 200);
  }
}
function relock(){
  localStorage.removeItem(LS_AUTH);
  const lockEl=document.getElementById("lock"), input=document.getElementById("lockInput");
  input.value=""; document.getElementById("lockErr").textContent="";
  lockEl.classList.remove("hide");
  setTimeout(()=>input.focus(), 200);
}
function submitLogin(){
  const input=document.getElementById("lockInput");
  const err=document.getElementById("lockErr");
  if(input.value.trim()===PASS){
    localStorage.setItem(LS_AUTH, ymd(today()));   // 오늘 날짜 저장 → 같은 날은 자동 통과, 다음날 다시 요청
    document.getElementById("lock").classList.add("hide");
    err.textContent="";
    checkDutyAlert();
  }else{
    err.textContent="답변이 올바르지 않습니다. 다시 입력해 주세요.";
    input.classList.remove("shake"); void input.offsetWidth; input.classList.add("shake");
    input.select();
  }
}

function boot(){
  // 공유 폼 select 채우기
  document.getElementById("sfEmp").innerHTML = EMPLOYEES.map(e=>`<option value="${e}">${e}</option>`).join("");
  document.getElementById("sfType").innerHTML = Object.entries(SHARE_TYPES).map(([k,t])=>`<option value="${k}">${t.label}</option>`).join("");

// 데이터 파일을 GitHub 원본(raw)에서 직접 fetch → Pages 배포를 안 기다리고 반영(지연 최대 ~5분).
// raw 실패 시 로컬(Pages) 파일로 폴백. 파일은 "window.XXX = {...};" 형태라 함수로 실행해 window에 반영.
var DATA_BASE = "https://raw.githubusercontent.com/taeyangsong-art/test/main/";
function loadData(file, cb){
  var urls = [DATA_BASE + file, file];   // 원본 우선 → 안되면 로컬(Pages)
  (function tryNext(i){
    if(i >= urls.length){ if(cb) cb(false); return; }
    fetch(urls[i] + "?t=" + Date.now(), {cache:"no-store"})
      .then(function(r){ if(!r.ok) throw 0; return r.text(); })
      .then(function(txt){ (new Function(txt))(); if(cb) cb(true); })
      .catch(function(){ tryNext(i+1); });
  })(0);
}
// 최초 로드(둘 다) → 부팅. 데이터 실패해도 앱은 뜸.
loadData("slack-data.js", function(){ loadData("calendar-data.js", function(){ boot(); }); });
// 선택 날짜의 구글 캘린더 일정 배열 (없으면 [])
function gcalDay(date){ return (window.GCAL_DATA&&window.GCAL_DATA.days&&window.GCAL_DATA.days[date])||[]; }
function reloadSlackData(cb){ loadData("slack-data.js", cb); }
function reloadCalendarData(cb){ loadData("calendar-data.js", cb); }
// 근실시간 자동 갱신: 2분마다 최신 데이터 확인 → 바뀌었으면 조용히 다시 그림
function startAutoRefresh(){
  setInterval(function(){
    const ae=document.activeElement;
    if(ae && (/^(INPUT|SELECT|TEXTAREA)$/.test(ae.tagName) || ae.isContentEditable)) return; // 입력 중이면 건너뜀
    if(document.querySelector(".overlay.show")) return;   // 모달 열림
    const lock=document.getElementById("lock");
    if(lock && !lock.classList.contains("hide")) return;  // 로그인 전
    const prev=(window.SLACK_DATA && window.SLACK_DATA.version) || 0;
    reloadSlackData(function(){
      const cur=(window.SLACK_DATA && window.SLACK_DATA.version) || 0;
      if(cur!==prev){ applySlackData(); if(activeCat!=="duty" && activeCat!=="share") renderMain(); }
    });
    const gprev=(window.GCAL_DATA && window.GCAL_DATA.version) || 0;
    reloadCalendarData(function(){
      const gcur=(window.GCAL_DATA && window.GCAL_DATA.version) || 0;
      if(gcur!==gprev && activeCat==="share") renderShare();
    });
  }, 120000);
}

// slack-data.js 의 날짜별 집계를 대시보드에 반영 (AS/온보딩은 슬랙이 원본 → 매 로드 시 해당 날짜 덮어씀)
function applySlackData(){
  const days=(window.SLACK_DATA&&window.SLACK_DATA.days)||{};
  for(const [date,entry] of Object.entries(days)){
    for(const [cat,obj] of Object.entries(entry.counts||{})){
      if(!COUNTS[cat]) COUNTS[cat]={};
      COUNTS[cat][date]=Object.assign({}, obj);
    }
  }
  save(LS_COUNT, COUNTS);
}
// 선택한 날짜의 슬랙 집계 항목 (없으면 null)
function slackDay(date){ return (window.SLACK_DATA&&window.SLACK_DATA.days&&window.SLACK_DATA.days[date])||null; }
function allSlackDates(){ return (window.SLACK_DATA&&window.SLACK_DATA.days)?Object.keys(window.SLACK_DATA.days).sort():[]; }
// VOC 처리(완료)를 완료일(doneDate) 기준으로 집계 — 설문 원본 날짜와 무관
function vocDoneByDay(){ const map={}; allSlackDates().forEach(d=>{ const v=(slackDay(d)||{}).voc; if(!v)return; [...(v.alerts||[]),...(v.praises||[])].forEach(x=>{ if(x.emp&&x.doneDate) map[x.doneDate]=(map[x.doneDate]||0)+1; }); }); return map; }
function vocDoneInRange(dates){ const set=new Set(dates); let cnt=0; const byEmp={}; allSlackDates().forEach(d=>{ const v=(slackDay(d)||{}).voc; if(!v)return; [...(v.alerts||[]),...(v.praises||[])].forEach(x=>{ if(x.emp&&x.doneDate&&set.has(x.doneDate)){ cnt++; byEmp[x.emp]=(byEmp[x.emp]||0)+1; } }); }); return {cnt, byEmp}; }

function seedShare(){
  const base=today();
  const add=(off,emp,type,title,time)=>{ const ds=ymd(addDays(base,off));
    if(!SHARE[ds])SHARE[ds]=[]; SHARE[ds].push({id:"seed"+off+emp.length+type,emp,type,title:title||"",time:time||""}); };
  add(0,"김기범","meeting","주간 파트 회의","10:00~11:00");
  add(0,"서상원","outside","거래처 방문","14:00~");
  add(1,"김규빈","annual","");
  add(1,"송태양","time","병원","15:00~17:00");
  add(2,"최민석","half","오후 반차");
  add(3,"김동욱","meeting","월간 리뷰","16:00~17:00");
  add(5,"배선유","annual","");
  add(-1,"심성현","outside","교육 참석");
  save(LS_SHARE, SHARE);
}

function seedDemo(){
  const cats=CATEGORIES.filter(c=>c.key!=="duty"&&c.key!=="share").map(c=>c.key);
  const base=today();
  for(let i=0;i<28;i++){
    const ds=ymd(addDays(base,-i));
    const dow=parseYmd(ds).getDay();
    if(dow===0) continue;
    cats.forEach(cat=>{
      EMPLOYEES.forEach((e,idx)=>{
        const n=Math.max(0, Math.round((Math.sin((i+idx)*1.3)+1)*3.5 + (idx%4)));
        if(n>0){ if(!COUNTS[cat])COUNTS[cat]={}; if(!COUNTS[cat][ds])COUNTS[cat][ds]={}; COUNTS[cat][ds][e]=n; }
      });
    });
  }
  save(LS_COUNT, COUNTS);
  // 당직근무 샘플: 내일/모레 당직자 지정 (알림 확인용)
  const tmr=ymd(addDays(base,1));
  DUTY[tmr]={day:"김기범",aft:"서상원",nit:"김규빈"};
  DUTY[ymd(addDays(base,2))]={day:"김동욱",aft:"송태양",nit:"김현기"};
  DUTY[ymd(base)]={day:"배선유",aft:"최민석",nit:"심성현"};
  save(LS_DUTY, DUTY);
}
