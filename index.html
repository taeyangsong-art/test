<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여행 준비물 체크리스트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Apple design tokens — light (default) */
    --page-bg: #f5f5f7;       /* parchment canvas */
    --card: #ffffff;          /* white utility card */
    --ink: #1d1d1f;           /* near-black text */
    --muted: #7a7a7a;         /* ink-muted-48 */
    --muted-strong: #333333;  /* ink-muted-80 */
    --hairline: #e0e0e0;
    --accent: #0066cc;        /* Action Blue — the single accent */
    --accent-focus: #0071e3;
    --track: #e8e8ed;         /* progress track */
  }
  html[data-theme="dark"] {
    --page-bg: #1d1d1f;
    --card: #272729;          /* near-black tile 1 */
    --ink: #ffffff;           /* on-dark */
    --muted: #cccccc;         /* body-muted on dark */
    --muted-strong: #cccccc;
    --hairline: rgba(255,255,255,0.14);
    --accent: #2997ff;        /* Sky Link Blue — dark-surface accent */
    --accent-focus: #2997ff;
    --track: #3a3a3d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-feature-settings: "ss03";
    background: var(--page-bg);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.47;
    transition: background-color .3s, color .3s;
  }

  /* ---- global nav: the only pure-black surface ---- */
  .global-nav {
    height: 44px;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 clamp(16px, 5vw, 40px);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .global-nav .wordmark {
    color: #fff;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: -0.224px;
  }
  .nav-toggle {
    background: #1d1d1f;
    color: #fff;
    border: none;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: -0.224px;
    border-radius: 8px;           /* rounded.sm */
    padding: 6px 13px;
    cursor: pointer;
    transition: transform .12s;
  }
  .nav-toggle:active { transform: scale(0.95); }

  /* ---- content container ---- */
  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: clamp(40px, 8vw, 72px) clamp(16px, 5vw, 24px) 96px;
  }

  /* ---- hero header ---- */
  .hero h1 {
    font-size: clamp(34px, 6vw, 40px);
    font-weight: 600;
    line-height: 1.10;
    letter-spacing: -0.02em;      /* Apple-tight */
  }
  .hero .tagline {
    font-size: 21px;
    font-weight: 400;
    line-height: 1.19;
    letter-spacing: 0.01em;
    color: var(--muted);
    margin-top: 10px;
  }

  /* ---- progress ---- */
  .progress {
    margin-top: 32px;
  }
  .progress-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 17px;
    font-weight: 400;
    letter-spacing: -0.374px;
    margin-bottom: 12px;
  }
  .progress-row .count b { font-weight: 600; }
  .progress-row .pct { color: var(--accent); font-weight: 600; }
  .progress-track {
    height: 6px;
    background: var(--track);
    border-radius: 9999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 9999px;
    transition: width .35s ease;
  }

  /* ---- presets ---- */
  .presets { margin-top: 40px; }
  .section-label {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.224px;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .preset-chips { display: flex; flex-wrap: wrap; gap: 10px; }
  .chip-ghost {
    /* button-secondary-pill: ghost pill */
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 9999px;        /* rounded.pill */
    padding: 9px 18px;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: -0.224px;
    cursor: pointer;
    transition: transform .12s;
  }
  .chip-ghost:active { transform: scale(0.95); }

  /* ---- input row ---- */
  .input-row {
    margin-top: 40px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .input-row .text {
    flex: 1 1 200px;
    min-width: 0;
    background: var(--card);
    color: var(--ink);
    border: 1px solid var(--hairline);
    border-radius: 9999px;        /* search-input is a pill */
    padding: 12px 20px;
    font-size: 17px;
    letter-spacing: -0.374px;
    outline: none;
    transition: border-color .15s;
  }
  .input-row .text:focus { border-color: var(--accent-focus); }
  .input-row .cat {
    flex: 0 0 auto;
    background: var(--card);
    color: var(--ink);
    border: 1px solid var(--hairline);
    border-radius: 9999px;
    padding: 12px 16px;
    font-size: 14px;
    letter-spacing: -0.224px;
    outline: none;
    cursor: pointer;
  }
  .btn-primary {
    /* button-primary: Action Blue pill */
    flex: 0 0 auto;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 9999px;        /* rounded.pill */
    padding: 11px 22px;
    font-size: 17px;
    font-weight: 400;
    letter-spacing: -0.374px;
    cursor: pointer;
    transition: transform .12s;
  }
  .btn-primary:active { transform: scale(0.95); }
  .btn-primary:focus-visible { outline: 2px solid var(--accent-focus); outline-offset: 2px; }

  /* ---- list: one utility card per category ---- */
  .list { margin-top: 40px; display: flex; flex-direction: column; gap: 20px; }
  .cat-card {
    background: var(--card);
    border: 1px solid var(--hairline);
    border-radius: 18px;          /* rounded.lg — no shadow */
    overflow: hidden;
  }
  .cat-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    border-bottom: 1px solid var(--hairline);
  }
  .cat-head .name {
    font-size: 21px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .cat-head .count {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: -0.224px;
    color: var(--muted);
  }
  .item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 15px 24px;
    border-bottom: 1px solid var(--hairline);
  }
  .item:last-child { border-bottom: none; }
  .check {
    flex: 0 0 auto;
    width: 22px;
    height: 22px;
    border: 1.5px solid var(--hairline);
    border-radius: 7px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background-color .15s, border-color .15s;
  }
  .check.done { background: var(--accent); border-color: var(--accent); }
  .check.done::after {
    content: '';
    width: 5px;
    height: 10px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg) translateY(-1px);
  }
  .label {
    flex: 1;
    font-size: 17px;
    font-weight: 400;
    letter-spacing: -0.374px;
    cursor: pointer;
    word-break: break-all;
  }
  .label.done { text-decoration: line-through; color: var(--muted); }
  .label-edit {
    flex: 1;
    font-size: 17px;
    letter-spacing: -0.374px;
    background: var(--page-bg);
    color: var(--ink);
    border: 1px solid var(--accent-focus);
    border-radius: 8px;
    padding: 2px 8px;
    outline: none;
  }
  .del {
    flex: 0 0 auto;
    width: 28px;
    height: 28px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    border-radius: 8px;
    transition: color .15s;
  }
  .del:hover { color: var(--ink); }

  .empty {
    text-align: center;
    color: var(--muted);
    font-size: 17px;
    letter-spacing: -0.374px;
    padding: 56px 20px;
    line-height: 1.6;
  }
</style>
</head>
<body>
  <nav class="global-nav">
    <span class="wordmark">🧳 여행 준비물</span>
    <button class="nav-toggle" id="themeBtn">다크 모드</button>
  </nav>

  <main class="wrap">
    <header class="hero">
      <h1>여행 준비물 체크리스트.</h1>
      <p class="tagline">챙길 것을 하나도 빠뜨리지 않도록.</p>

      <div class="progress">
        <div class="progress-row">
          <span class="count" id="progressLabel"><b>0개</b> 중 <b>0개</b> 완료</span>
          <span class="pct" id="progressPct">0%</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      </div>
    </header>

    <section class="presets">
      <div class="section-label">템플릿 불러오기</div>
      <div class="preset-chips">
        <button class="chip-ghost" data-preset="해외">해외여행</button>
        <button class="chip-ghost" data-preset="국내">국내여행</button>
        <button class="chip-ghost" data-preset="캠핑">캠핑</button>
        <button class="chip-ghost" data-preset="출장">출장</button>
      </div>
    </section>

    <div class="input-row">
      <input type="text" class="text" id="itemInput" placeholder="항목 입력..." autocomplete="off">
      <select class="cat" id="catSelect" title="카테고리">
        <option value="서류">서류</option>
        <option value="전자기기">전자기기</option>
        <option value="의류">의류</option>
        <option value="세면도구">세면도구</option>
        <option value="기타">기타</option>
      </select>
      <button class="btn-primary" id="addBtn">추가</button>
    </div>

    <div class="list" id="list"></div>
  </main>

<script>
  const CATEGORIES = [
    { key: '서류',     icon: '📄' },
    { key: '전자기기', icon: '🔌' },
    { key: '의류',     icon: '👕' },
    { key: '세면도구', icon: '🧴' },
    { key: '기타',     icon: '📦' },
  ];

  const PRESETS = {
    해외: [
      { text: '여권', cat: '서류' }, { text: '항공권 / e-티켓', cat: '서류' },
      { text: '해외여행자 보험', cat: '서류' }, { text: '환전 / 신용카드', cat: '서류' },
      { text: '휴대폰 충전기', cat: '전자기기' }, { text: '멀티 어댑터', cat: '전자기기' },
      { text: '보조배터리', cat: '전자기기' }, { text: '상하의 / 속옷', cat: '의류' },
      { text: '겉옷 / 외투', cat: '의류' }, { text: '칫솔 / 치약', cat: '세면도구' },
      { text: '기초 화장품', cat: '세면도구' }, { text: '상비약', cat: '기타' },
    ],
    국내: [
      { text: '신분증', cat: '서류' }, { text: '숙소 예약 확인', cat: '서류' },
      { text: '휴대폰 충전기', cat: '전자기기' }, { text: '보조배터리', cat: '전자기기' },
      { text: '갈아입을 옷', cat: '의류' }, { text: '속옷 / 양말', cat: '의류' },
      { text: '세면도구 세트', cat: '세면도구' }, { text: '수건', cat: '세면도구' },
      { text: '상비약', cat: '기타' }, { text: '간식 / 물', cat: '기타' },
    ],
    캠핑: [
      { text: '예약 확인증', cat: '서류' }, { text: '랜턴 / 손전등', cat: '전자기기' },
      { text: '보조배터리', cat: '전자기기' }, { text: '방수 겉옷', cat: '의류' },
      { text: '여벌 옷 / 양말', cat: '의류' }, { text: '휴대용 세면도구', cat: '세면도구' },
      { text: '물티슈', cat: '세면도구' }, { text: '텐트 / 타프', cat: '기타' },
      { text: '침낭 / 매트', cat: '기타' }, { text: '버너 / 코펠', cat: '기타' },
      { text: '아이스박스', cat: '기타' }, { text: '상비약 / 벌레퇴치제', cat: '기타' },
    ],
    출장: [
      { text: '신분증 / 명함', cat: '서류' }, { text: '출장 서류 / 발표자료', cat: '서류' },
      { text: '노트북', cat: '전자기기' }, { text: '노트북 충전기', cat: '전자기기' },
      { text: '휴대폰 충전기', cat: '전자기기' }, { text: '보조배터리', cat: '전자기기' },
      { text: '정장 / 셔츠', cat: '의류' }, { text: '속옷 / 양말', cat: '의류' },
      { text: '세면도구 세트', cat: '세면도구' }, { text: '면도기', cat: '세면도구' },
      { text: '상비약', cat: '기타' },
    ],
  };

  let items = [];

  const listEl = document.getElementById('list');
  const inputEl = document.getElementById('itemInput');
  const catSelect = document.getElementById('catSelect');
  const addBtn = document.getElementById('addBtn');
  const progressLabel = document.getElementById('progressLabel');
  const progressPct = document.getElementById('progressPct');
  const progressFill = document.getElementById('progressFill');
  const themeBtn = document.getElementById('themeBtn');

  function render() {
    listEl.innerHTML = '';

    if (items.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty';
      empty.innerHTML = '아직 항목이 없어요.<br>위에서 템플릿을 불러오거나 직접 추가해보세요.';
      listEl.appendChild(empty);
      updateProgress();
      return;
    }

    CATEGORIES.forEach(cat => {
      const group = items.filter(it => it.cat === cat.key);
      if (group.length === 0) return;
      const doneCount = group.filter(it => it.done).length;

      const card = document.createElement('div');
      card.className = 'cat-card';

      const head = document.createElement('div');
      head.className = 'cat-head';
      head.innerHTML = `<span class="name">${cat.icon} ${cat.key}</span><span class="count">${doneCount} / ${group.length}</span>`;
      card.appendChild(head);

      group.forEach(item => card.appendChild(buildRow(item)));
      listEl.appendChild(card);
    });

    updateProgress();
  }

  function buildRow(item) {
    const row = document.createElement('div');
    row.className = 'item';

    const check = document.createElement('div');
    check.className = 'check' + (item.done ? ' done' : '');
    check.addEventListener('click', () => { item.done = !item.done; render(); });

    const label = document.createElement('span');
    label.className = 'label' + (item.done ? ' done' : '');
    label.textContent = item.text;
    label.addEventListener('click', () => startEdit(row, item, label));

    const del = document.createElement('button');
    del.className = 'del';
    del.innerHTML = '&times;';
    del.setAttribute('aria-label', '삭제');
    del.addEventListener('click', () => { items = items.filter(it => it !== item); render(); });

    row.appendChild(check);
    row.appendChild(label);
    row.appendChild(del);
    return row;
  }

  function startEdit(row, item, label) {
    const editInput = document.createElement('input');
    editInput.type = 'text';
    editInput.className = 'label-edit';
    editInput.value = item.text;
    row.replaceChild(editInput, label);
    editInput.focus();
    editInput.setSelectionRange(item.text.length, item.text.length);

    let finished = false;
    const commit = () => {
      if (finished) return;
      finished = true;
      const v = editInput.value.trim();
      if (v) item.text = v;
      render();
    };
    editInput.addEventListener('blur', commit);
    editInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') commit();
      else if (e.key === 'Escape') { finished = true; render(); }
    });
  }

  function updateProgress() {
    const total = items.length;
    const done = items.filter(i => i.done).length;
    const pct = total === 0 ? 0 : Math.round((done / total) * 100);
    progressLabel.innerHTML = `<b>${total}개</b> 중 <b>${done}개</b> 완료`;
    progressPct.textContent = `${pct}%`;
    progressFill.style.width = pct + '%';
  }

  function addItem() {
    const text = inputEl.value.trim();
    if (!text) return;
    items.push({ text, done: false, cat: catSelect.value });
    inputEl.value = '';
    inputEl.focus();
    render();
  }

  function loadPreset(name) {
    const preset = PRESETS[name];
    if (!preset) return;
    if (items.length > 0 && !confirm(`'${name}' 템플릿을 불러올까요?\n현재 목록은 새 목록으로 교체됩니다.`)) return;
    items = preset.map(p => ({ text: p.text, done: false, cat: p.cat }));
    render();
  }

  addBtn.addEventListener('click', addItem);
  inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') addItem(); });
  document.querySelectorAll('.chip-ghost').forEach(chip => {
    chip.addEventListener('click', () => loadPreset(chip.dataset.preset));
  });

  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    themeBtn.textContent = theme === 'dark' ? '라이트 모드' : '다크 모드';
  }
  themeBtn.addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    setTheme(cur === 'dark' ? 'light' : 'dark');
  });
  setTheme(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

  render();
</script>
</body>
</html>
