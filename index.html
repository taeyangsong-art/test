<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<script>
/* 캐시 무력화: index.html은 URL(쿼리 포함)별로 캐시돼 ?v=240 같은 고정 링크가 옛 화면을 물고 있음.
   → 탭당 1회, 유일한 cb 토큰을 붙여 최신 HTML을 강제로 새로 받는다(무한루프·반복 리로드 방지). */
(function(){
  try{
    if(sessionStorage.getItem('__cb_done')) return;   // 이 탭에서 이미 갱신함 → 통과
    sessionStorage.setItem('__cb_done','1');
    var u=new URL(location.href);
    u.searchParams.set('cb', Date.now().toString(36)); // 매 접속마다 유일값 → 새 캐시 키
    location.replace(u.toString());                    // 히스토리 오염 없이 최신본으로 1회 이동
  }catch(e){}
})();
</script>
<title>원격파트 대시보드 · iShopCare</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<style>
  :root{
    --ink:#1d1d1f; --ink-soft:#424245; --gray:#6e6e73; --gray2:#86868b;
    --line:#d2d2d7; --line-soft:#e8e8ed; --surface:#f5f5f7; --surface2:#fafafa;
    --canvas:#ffffff; --blue:#0071e3; --blue-soft:#e8f1fd; --blue-deep:#0060c0;
    --red:#ff3b30; --red-soft:#ffecec; --green:#34c759; --green-soft:#e7f8ec;
    --orange:#ff9500; --purple:#5e5ce6;
    --sat:#0a84ff; --sun:#ff3b30;
    --shadow:0 1px 3px rgba(0,0,0,.06),0 6px 20px rgba(0,0,0,.05);
    --radius:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro KR","Apple SD Gothic Neo",
      "Pretendard","Segoe UI",Roboto,sans-serif;
    background:var(--surface); color:var(--ink);

    display:flex; min-height:100vh;
  }

  /* ===== Sidebar ===== */

    width:248px; flex:0 0 248px; background:var(--canvas);
    border-right:1px solid var(--line-soft); padding:26px 16px;

  }
  .brand{padding:4px 12px 22px; }
  .brand h1{font-size:17px; font-weight:700; letter-spacing:-.02em; line-height:1.3}
  .brand p{font-size:12px; color:var(--gray2); margin-top:4px}
  .nav-label{font-size:11px; font-weight:700; letter-spacing:.06em; color:var(--gray2);
    padding:8px 12px 4px; text-transform:uppercase}
  .navbtn{
    display:flex; align-items:center; gap:11px; width:100%; text-align:left;
    padding:11px 13px; border:none; background:none; border-radius:11px;
    font-size:15px; font-weight:500; color:var(--ink-soft); cursor:pointer;
    transition:background .15s, color .15s; font-family:inherit;
  }
  .navbtn:hover{background:var(--surface)}
  .navbtn.active{background:var(--blue); color:#fff; font-weight:600}
  .navbtn .ic{width:20px; text-align:center; font-size:16px}
  .lock-out{margin-top:auto; display:flex; align-items:center; justify-content:center; gap:8px;
    padding:11px 13px; border:1px solid var(--line-soft); background:none; border-radius:11px;
    font-size:13px; font-weight:600; color:var(--gray); cursor:pointer; font-family:inherit; transition:.15s}
  .lock-out:hover{background:var(--surface); color:var(--ink)}

  /* ===== Main ===== */
  .main{flex:1; min-width:0; padding:32px 40px 64px; overflow-x:hidden}
  .page-head{display:flex; align-items:flex-end; justify-content:space-between; gap:20px;
    flex-wrap:wrap; margin-bottom:26px}
  .page-head h2{font-size:30px; font-weight:700; letter-spacing:-.03em}
  .page-head .sub{font-size:14px; color:var(--gray); margin-top:5px}

  /* controls */
  .controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
  .seg{display:inline-flex; background:var(--surface); border-radius:11px; padding:3px;
    border:1px solid var(--line-soft)}
  .seg button{border:none; background:none; padding:8px 16px; border-radius:8px;
    font-size:13px; font-weight:600; color:var(--gray); cursor:pointer; font-family:inherit;
    transition:.15s}
  .seg button.on{background:var(--canvas); color:var(--ink); box-shadow:0 1px 2px rgba(0,0,0,.08)}
  input[type=date]{font-family:inherit; font-size:14px; padding:9px 13px; border:1px solid var(--line);
    border-radius:11px; background:var(--canvas); color:var(--ink); cursor:pointer}
  .btn{border:none; background:var(--canvas); border:1px solid var(--line);
    padding:9px 15px; border-radius:11px; font-size:13px; font-weight:600; color:var(--ink);
    cursor:pointer; font-family:inherit; transition:.15s}
  .btn:hover{background:var(--surface)}
  .btn.primary{background:var(--blue); color:#fff; border-color:var(--blue)}
  .btn.primary:hover{background:var(--blue-deep)}

  /* sidebar divider */
  .nav-div{height:1px; background:var(--line-soft); margin:8px 12px}

  /* Overview 헤드라인/알림/근무/랭킹 */

  .hl-card{border-radius:20px; padding:18px 20px; border:1.5px solid transparent; position:relative; overflow:hidden; transition:transform .15s}

  .hl-card.gold{background:linear-gradient(155deg,#fff5db,#fffdf4); border-color:#ffe6a8}
  .hl-card.mint{background:linear-gradient(155deg,#e4faef,#f4fffa); border-color:#c3efd7}
  .hl-ic{font-size:26px; line-height:1; margin-bottom:8px}
  .hl-lab{font-size:13px; font-weight:700; color:var(--gray)}
  .hl-big{font-size:33px; font-weight:800; letter-spacing:-.03em; line-height:1.12; margin-top:2px; color:var(--ink)}
  .hl-big small{font-size:14px; font-weight:600; color:var(--gray2); margin-left:2px}
  /* MVP 처리건수 강조 + 클릭 */

  .mvp-proc b{font-size:30px; font-weight:800; color:#c77800; letter-spacing:-.02em}

  .mvp-proc-hint{font-size:11px; font-weight:700; color:#c77800; margin-left:6px; opacity:.8}

  .ov-tile.clickable{cursor:pointer; transition:.15s}
  .ov-tile.clickable:hover{transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,0,0,.08)}
  .ov-drill-ic{font-size:11px; margin-left:5px; opacity:.4}
  /* 처리 상세 모달 */
  .detail-overlay{position:fixed; inset:0; z-index:9998; background:rgba(0,0,0,.45); display:flex; align-items:center; justify-content:center; padding:20px}
  .detail-box{background:var(--canvas,#fff); border-radius:18px; width:100%; max-width:640px; max-height:82vh; display:flex; flex-direction:column; padding:20px 22px; box-shadow:0 24px 60px rgba(0,0,0,.3)}
  .detail-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px}
  .detail-head h3{font-size:17px; font-weight:800; color:var(--ink)}
  .detail-x{border:none; background:var(--surface2); width:30px; height:30px; border-radius:50%; font-size:15px; cursor:pointer; color:var(--gray)}
  .detail-x:hover{background:var(--line-soft)}
  .detail-scroll{overflow:auto; margin-top:12px}
  .dm-num{color:var(--gray2); font-weight:700; font-size:12px; text-align:center}
  .ss-summary{background:var(--surface2); border:1px solid var(--line-soft); border-radius:12px; padding:12px 14px; display:flex; flex-direction:column; gap:8px; margin-top:12px}
  .ss-total{font-size:14.5px; color:var(--charcoal,#2d2d2d)} .ss-total b{font-size:18px; color:var(--blue)}
  .ss-chips{display:flex; flex-wrap:wrap; gap:6px}
  .ss-chip{background:#fff; border:1px solid var(--line-soft); border-radius:8px; padding:3px 9px; font-size:12.5px; color:var(--gray)} .ss-chip b{color:var(--ink)}
  .ss-status{font-size:12.5px; color:var(--gray)}
  .ss-note{font-size:12.5px; color:var(--slate,#454b54); max-width:280px; white-space:normal; word-break:break-word}
  .as-brk{display:flex; flex-direction:column; gap:9px}
  .as-brk-row{display:flex; align-items:center; gap:12px; cursor:pointer; padding:5px 6px; border-radius:9px; transition:background .12s}
  .as-brk-row:hover{background:var(--surface,#f5f5f7)}
  .as-brk-lab{flex:0 0 108px; font-size:13.5px; font-weight:700; color:var(--ink)}
  .as-brk-bar{flex:1; height:14px; background:var(--surface,#f5f5f7); border-radius:8px; overflow:hidden}
  .as-brk-fill{height:100%; border-radius:8px; min-width:6px; transition:width .3s}
  .as-brk-n{flex:0 0 auto; font-size:12.5px; color:var(--gray); white-space:nowrap} .as-brk-n b{font-size:15px; color:var(--ink)}
  .as-brk-note{font-size:11.5px; color:var(--gray2); margin-top:10px}
  .dm-st{font-size:11px; font-weight:800; padding:2px 8px; border-radius:20px; white-space:nowrap}
  .hl-card.clickable{cursor:pointer; transition:.15s}
  .hl-card.clickable:hover{transform:translateY(-2px); box-shadow:0 10px 24px rgba(0,0,0,.1)}
  .hl-drill{font-size:11px; opacity:.5; margin-left:2px}
  /* 🎁 팀 목표 */
  .tg-sub-lab{font-size:13px; font-weight:700; color:#7c5cff; background:#efeaff; padding:2px 10px; border-radius:20px; margin-left:6px}
  .tg-month{font-size:15px; font-weight:800; color:var(--ink); min-width:96px; text-align:center; display:inline-block}
  .tg-hero{text-align:center; background:linear-gradient(160deg,#f3efff,#eef4ff)}
  .tg-hero-lab{font-size:13px; font-weight:700; color:var(--gray)}
  .tg-hero-big{font-size:46px; font-weight:800; color:#7c5cff; letter-spacing:-.02em; margin:4px 0 18px}
  .tg-hero-bar{position:relative; height:16px; border-radius:10px; background:#e3ddf5; margin:0 14px}
  .tg-hero-fill{height:100%; border-radius:10px; background:linear-gradient(90deg,#7c5cff,#a855f7); transition:width .5s}
  .tg-hero-mark{position:absolute; top:-7px; transform:translateX(-50%); font-size:21px; filter:drop-shadow(0 1px 2px rgba(0,0,0,.25))}
  .tg-hero-sub{font-size:12.5px; color:var(--gray); margin-top:18px}
  .tg-tier{display:flex; gap:14px; align-items:center; border:2px solid var(--line); border-radius:16px; padding:16px; background:var(--surface2)}
  .tg-tier.reached{border-color:#16a34a; background:#f0fdf4}
  .tg-tier-ic{font-size:46px; flex:0 0 auto; line-height:1}
  .tg-tier-body{flex:1; min-width:0}
  .tg-tier-top{display:flex; justify-content:space-between; align-items:baseline; gap:8px}
  .tg-tier-reward{font-size:16px; font-weight:800; color:var(--ink)}
  .tg-tier-coins{font-size:14px; font-weight:800; color:#e8a020; white-space:nowrap}
  .tg-tier-pct{font-size:22px; font-weight:800; color:#7c5cff; white-space:nowrap; letter-spacing:-.02em}
  .tg-tier-pct.done{color:#16a34a}
  .tg-tier-by{font-size:12px; color:var(--gray); margin:3px 0 9px}
  .tg-bar{height:12px; border-radius:8px; background:#e5e7eb; overflow:hidden}
  .tg-bar-fill{height:100%; border-radius:8px; background:linear-gradient(90deg,#7c5cff,#a855f7); transition:width .5s}

  .tg-tier-stat{font-size:12.5px; color:var(--gray); margin-top:7px}
  .tg-done{color:#16a34a; font-size:14px}

  .hl-card.gold .hl-big{color:#c77800}
  .hl-card.mint .hl-big{color:#0f9d58}

  /* 오늘의 MVP 축하 효과 */
  #mvpCard{overflow:visible}
  .mvp-flash{position:absolute; inset:0; border-radius:20px; background:radial-gradient(circle at 50% 45%,#fff,rgba(255,255,255,0) 70%); opacity:0; pointer-events:none; z-index:3}
  .mvp-confetti{position:absolute; left:50%; top:46%; width:0; height:0; pointer-events:none; z-index:4}
  .confetti{position:absolute; left:0; top:0; width:9px; height:13px; opacity:0; will-change:transform,opacity; animation:confettiPop 1.4s cubic-bezier(.2,.7,.3,1) forwards}
  @keyframes confettiPop{0%{opacity:1; transform:translate(0,0) rotate(0) scale(1)}70%{opacity:1}100%{opacity:0; transform:translate(var(--dx),calc(var(--dy) + 70px)) rotate(var(--rot)) scale(.5)}}
  #mvpCard.celebrate{animation:mvpGlow 1.1s ease-out}
  @keyframes mvpGlow{0%{box-shadow:0 0 0 rgba(255,190,60,0)}22%{box-shadow:0 0 34px rgba(255,190,60,.85)}100%{box-shadow:0 0 0 rgba(255,190,60,0)}}
  #mvpCard.celebrate .mvp-flash{animation:mvpFlash .6s ease-out}
  @keyframes mvpFlash{0%{opacity:0}14%{opacity:.9}100%{opacity:0}}
  #mvpCard.celebrate .hl-ic{animation:mvpBounce .9s ease}
  @keyframes mvpBounce{0%,100%{transform:scale(1) rotate(0)}30%{transform:scale(1.45) rotate(-10deg)}60%{transform:scale(1.12) rotate(7deg)}}
  .alert-list{display:flex; flex-direction:column; gap:8px}
  .alert-item{display:flex; align-items:center; justify-content:space-between; padding:11px 14px;
    background:var(--red-soft); border-radius:11px; font-size:14px; font-weight:600; color:var(--ink)}
  .alert-cnt{background:var(--red); color:#fff; font-weight:800; font-size:13px; min-width:24px; text-align:center;

  .duty-today{display:flex; flex-direction:column; gap:8px; margin-bottom:12px}

  .dt-name{font-weight:600; color:var(--ink)}
  .dt-leave{font-size:13.5px; color:var(--slate,#454b54); border-top:1px solid var(--line-soft); padding-top:11px}

  .leave-list{display:flex; flex-wrap:wrap; gap:9px}
  .leave-item{display:inline-flex; align-items:center; gap:9px; padding:9px 14px;
    background:var(--surface2); border:1px solid var(--line-soft); border-radius:12px}
  .leave-emp{font-size:15px; font-weight:700; color:var(--ink)}
  .leave-type{font-size:12px; font-weight:700; padding:3px 10px; border-radius:20px; white-space:nowrap}
  .leave-time{font-size:12.5px; font-weight:600; color:var(--gray); white-space:nowrap}
  .cat-chip{display:inline-block; font-size:12px; font-weight:700; padding:3px 10px; border-radius:20px; white-space:nowrap}
  .cnt-badge{display:inline-block; background:var(--red); color:#fff; font-size:12px; font-weight:800; padding:1px 9px; border-radius:20px; margin-left:6px; vertical-align:middle}

    background:var(--surface2); border:1px solid var(--line-soft)}
  .rank-item.top{background:linear-gradient(180deg,#fff9e8,#fafafa); border-color:#ffe9a8}
  .rank-medal{font-size:22px; font-weight:800; color:var(--gray)}
  .rank-name{font-size:15px; font-weight:700; margin-top:4px; color:var(--ink)}
  .rank-val{font-size:13px; color:var(--gray); margin-top:2px; font-weight:600}
  /* 랭킹 테마 — 천국(밝음) vs 어둠 */
  .rank-sub{font-size:12px; font-weight:800; margin-left:6px}
  .light-rank{background:linear-gradient(165deg,#eef5ff,#fff5fb); border:1px solid #dbe8ff}
  .light-rank .rank-sub{color:#ff86c2}
  .rank-item.light{background:#fff; border:1px solid #e6eeff}
  .rank-item.light.top{background:linear-gradient(180deg,#fff8e6,#fffdf7); border-color:#ffd766; animation:lightpulse 2.2s ease-in-out infinite}
  @keyframes lightpulse{0%,100%{box-shadow:0 0 8px rgba(255,205,70,.45); border-color:#ffe6a0}50%{box-shadow:0 0 24px rgba(255,214,90,.95); border-color:#ffcf4d}}
  .dark-rank{background:linear-gradient(165deg,#edeef4,#f6f2fa); border:1px solid #d6cae8}
  .dark-rank .card-head h3{color:var(--ink)}
  .dark-rank .hint{color:var(--gray2)}
  .dark-rank .rank-sub{color:#9a1f47}
  .rank-item.dark{background:#f2ecfb; border:1px solid #4a3568}
  .rank-item.dark .rank-name{color:#111111 !important; font-weight:800; font-size:16px}
  .rank-item.dark .rank-val{color:#b02050; font-weight:800}
  .rank-item.dark.worst{background:linear-gradient(180deg,#ffdbe6,#f2e6fb); border-color:#c02f5e; animation:darkpulse 2.2s ease-in-out infinite}

  .voc-snap{display:flex; gap:24px; flex-wrap:wrap}
  .snap-big{font-size:30px; font-weight:800; letter-spacing:-.03em; line-height:1.1; color:var(--ink); margin-top:3px}
  .voc-proc{font-weight:700; color:var(--green,#166534)}

  .r-face{margin-right:3px}
  .r-title{font-size:11px; font-weight:800; color:#9c36b5; margin-right:4px}
  .game-me{display:flex; align-items:center; gap:22px; background:linear-gradient(160deg,#f3f0ff,#fff)}
  .avatar-big{position:relative; width:122px; height:150px; flex:0 0 auto; overflow:hidden;
    background:linear-gradient(165deg,#f6f1ff 0%,#eaf1ff 55%,#e0ebff 100%);
    border:2px solid #e4dcff; border-radius:24px;
    box-shadow:inset 0 2px 12px rgba(255,255,255,.75), 0 8px 18px rgba(120,90,200,.14);
    display:flex; align-items:center; justify-content:center}

    background:radial-gradient(circle,rgba(255,255,255,.95),rgba(190,170,255,.28) 60%,transparent 72%); filter:blur(2px)}

  .kpi.k-coral .val{color:#e0315a}
  .kpi.k-red{background:linear-gradient(160deg,#ffe8e8,#fff6f6); border-left:5px solid #ff3b30}
  .kpi.k-red .val{color:#d92d20}
  .kpi.k-teal{background:linear-gradient(160deg,#e3f8f5,#f5fffd); border-left:5px solid #0aa5b1}
  .kpi.k-teal .val{color:#0a8a94}

  /* card */
  .card{background:var(--canvas); border-radius:var(--radius); padding:24px; box-shadow:var(--shadow);
    margin-bottom:24px}
  .card-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; gap:12px}
  .card-head h3{font-size:17px; font-weight:700; letter-spacing:-.01em}
  .voc-hd-filter{display:flex; gap:7px; align-items:center; flex-wrap:wrap; justify-content:flex-end}
  .voc-hd-filter .sel{padding:6px 9px; font-size:12.5px}
  .voc-hd-filter .btn{padding:6px 9px; font-size:12.5px}
  .card-head .hint{font-size:12.5px; color:var(--gray2)}
  .grid2{display:grid; grid-template-columns:1.15fr .85fr; gap:24px; align-items:start}
  .grid2.even{grid-template-columns:1fr 1fr; align-items:stretch}
  .grid2.even>.card{display:flex; flex-direction:column; min-height:300px}
  .grid2.even .chart-wrap{flex:1; display:flex; align-items:center}
  .grid2.even .donut-hold{flex:1; display:flex; align-items:center; justify-content:center}

  /* chart */
  .chart-wrap{width:100%; overflow-x:auto}
  svg{display:block; max-width:100%}
  .bar-row{margin-bottom:11px}
  .bar-meta{display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px}
  .bar-meta .nm{font-weight:600; color:var(--ink-soft)}
  .bar-meta .ct{font-weight:700; color:var(--ink)}
  .bar-track{height:10px; background:var(--surface); border-radius:6px; overflow:hidden}
  .bar-fill{height:100%; border-radius:6px; background:linear-gradient(90deg,var(--blue),#4a9bff);
    transition:width .5s cubic-bezier(.22,1,.36,1)}

  /* table */
  table{width:100%; border-collapse:collapse; font-size:14px}
  th{text-align:left; font-size:12px; font-weight:700; color:var(--gray); letter-spacing:.02em;
    padding:11px 12px; border-bottom:1px solid var(--line); white-space:nowrap}
  th.num,td.num{text-align:right}
  td{padding:9px 12px; border-bottom:1px solid var(--line-soft); vertical-align:middle}
  tr:last-child td{border-bottom:none}
  .emp-name{font-weight:600}
  .count-input{width:74px; text-align:right; font-family:inherit; font-size:14px; font-weight:600;
    padding:7px 9px; border:1px solid var(--line); border-radius:9px; background:var(--surface2);
    color:var(--ink); transition:.15s}
  .count-input:focus{outline:none; border-color:var(--blue); background:#fff; box-shadow:0 0 0 3px var(--blue-soft)}
  tfoot td{font-weight:700; border-top:2px solid var(--line); padding-top:13px}
  .rank{display:inline-flex; width:22px; height:22px; align-items:center; justify-content:center;
    border-radius:7px; background:var(--surface); font-size:12px; font-weight:700; color:var(--gray)}

  /* VOC */
  .empty-note{text-align:center; color:var(--gray2); font-size:14px; padding:34px 0}
  .prog{display:flex; height:12px; background:var(--surface); border-radius:8px; overflow:hidden}
  .prog-fill{height:100%; transition:width .5s cubic-bezier(.22,1,.36,1)}
  .quote-card{border-radius:12px; padding:12px 14px; margin-bottom:10px}
  .quote-card.neg{background:var(--red-soft); border-left:3px solid var(--red)}
  .quote-card.pos{background:var(--green-soft); border-left:3px solid var(--green)}
  .quote-text{font-size:13.5px; line-height:1.55; color:var(--ink-soft); font-style:italic}
  .quote-meta{font-size:11.5px; color:var(--gray2); margin-top:6px; font-weight:600}
  .voc-reason{font-size:12.5px; line-height:1.5; margin:2px 0; color:var(--ink-soft)}
  .voc-rcat{display:inline-block; background:var(--red-soft); color:var(--red); font-weight:700; font-size:11px;
    padding:1px 7px; border-radius:6px; margin-right:5px; white-space:nowrap}
  .praise-emp{display:inline-block; background:var(--green-soft); color:#166534; font-weight:700;
    font-size:12px; padding:2px 9px; border-radius:7px}
  /* 칭찬 카드 (예쁘게) */
  .praise-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(268px,1fr)); gap:14px}
  .praise-card{border:1px solid var(--line-soft); border-left:4px solid var(--green); border-radius:16px;
    padding:15px 17px; background:linear-gradient(180deg,#f4fdf7,#fafafa); display:flex; flex-direction:column; gap:11px;
    box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .praise-top{display:flex; align-items:center; justify-content:space-between; gap:8px}
  .praise-store{font-weight:700; font-size:15px; color:var(--ink); letter-spacing:-.01em}
  .praise-topr{display:flex; align-items:center; gap:7px; flex:0 0 auto}
  .praise-score{background:#dcfce7; color:#166534; font-weight:700; font-size:12px;
    padding:3px 10px; border-radius:20px; white-space:nowrap}
  .praise-del{border:none; background:transparent; color:var(--gray2); cursor:pointer; font-size:17px;
    line-height:1; padding:0 2px; font-weight:700; border-radius:6px}
  .praise-del:hover{color:var(--red); background:var(--red-soft)}
  .praise-quote{font-size:13.5px; line-height:1.6; color:var(--ink-soft); font-style:italic;
    border-left:2px solid #bbf7d0; padding-left:10px}
  .praise-foot{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:auto; flex-wrap:wrap}
  .praise-mid{font-size:11px; color:var(--gray2)}
  .praise-sel{font-family:inherit; font-size:12.5px; font-weight:600; padding:7px 10px; border:1px solid var(--line);
    border-radius:9px; background:#fff; color:var(--ink); cursor:pointer}
  .praise-sel:focus{outline:none; border-color:var(--green); box-shadow:0 0 0 3px var(--green-soft)}
  .voc-rawind{font-size:11px; color:var(--gray2); margin-top:2px}
  .voc-donedate{font-size:11px; color:#1e40af; font-weight:800; margin-top:2px}
  .praise-emp-row{cursor:pointer; border-radius:8px; padding:3px 6px; margin:0 -6px; transition:.12s}
  .praise-emp-row:hover{background:var(--green-soft,#dcfce7)}
  .pe-drill{font-size:10px; opacity:.5}
  .quote-card.clickable{cursor:pointer; transition:.12s}
  .quote-card.clickable:hover{transform:translateY(-1px); box-shadow:0 4px 12px rgba(0,0,0,.08)}
  .quote-more{font-size:11px; font-weight:800; color:var(--blue,#1a73e8); margin-left:6px; white-space:nowrap}
  .vrep-more-box{display:none}
  .vrep-more-box.open{display:block}
  .vrep-toggle{width:100%; margin-top:8px; border:1px dashed var(--line); background:var(--surface2); color:var(--gray);
    border-radius:10px; padding:8px; font-family:inherit; font-size:12.5px; font-weight:700; cursor:pointer}
  .vrep-toggle:hover{background:var(--line-soft); color:var(--ink)}
  .vday-grid{display:flex; flex-wrap:wrap; gap:8px}
  .vday{min-width:54px; text-align:center; border:1px solid var(--line-soft); border-radius:10px; padding:9px 7px; background:var(--surface2)}
  .vday.has{background:#e8f0fe; border-color:#c7dbff}
  .vday-n{font-size:19px; font-weight:800; color:var(--gray2); line-height:1}
  .vday.has .vday-n{color:#1a56db}
  .vday-d{font-size:11px; color:var(--gray2); margin-top:4px}
  .voc-rawtxt{font-size:12px; color:var(--ink-soft); line-height:1.45}
  .voc-table td{vertical-align:top}
  .voc-stat{font-weight:700}
  .voc-stat.done{background:var(--green-soft); color:#166534; border-color:#bbf7d0}
  .voc-stat.hold{background:#fff4d6; color:#a8620a; border-color:#ffe1a8}
  /* 상태별 색상: 처리중=회색·처리완료=파랑·OB필요없음=초록·부재=빨강·통화거부=주황 */
  .voc-stat.st-progress{background:#eef1f4; color:#475569; border-color:#dde3ea}
  .voc-stat.st-done{background:#dbeafe; color:#1e40af; border-color:#bfdbfe}
  .voc-stat.st-ob{background:var(--green-soft); color:#166534; border-color:#bbf7d0}
  .voc-stat.st-absent{background:#ffe1de; color:#b91c1c; border-color:#fecaca}
  .voc-stat.st-reject{background:#ffedd5; color:#c2410c; border-color:#fed7aa}
  /* VOC 드릴다운(업종/사유 → 매장 상세) */
  .voc-drill{border:1px solid var(--line-soft); border-radius:10px; margin-bottom:8px; overflow:hidden; background:var(--surface2)}
  .voc-drill summary{list-style:none; cursor:pointer; display:flex; align-items:center; gap:10px; padding:10px 12px}
  .voc-drill summary::-webkit-details-marker{display:none}
  .voc-drill summary::before{content:'▸'; color:var(--gray2); font-size:11px; transition:.15s; flex:0 0 auto}
  .voc-drill[open] summary::before{transform:rotate(90deg)}
  .voc-drill[open]{background:var(--canvas)}
  .vd-name{flex:0 0 auto; font-size:14px; font-weight:700; color:var(--ink); min-width:92px}
  .vd-bar{flex:1; height:8px; background:var(--line-soft); border-radius:5px; overflow:hidden}
  .vd-fill{display:block; height:100%; border-radius:5px}
  .vd-cnt{flex:0 0 auto; font-size:13px; font-weight:800; color:var(--gray)}
  .vd-pct{display:inline-block; font-size:11.5px; font-weight:800; color:#1F4FFA; background:#eef2ff; border-radius:20px; padding:1px 7px; margin-left:3px}
  .mom-wrap{flex:0 0 auto; display:inline-flex; gap:4px; align-items:center; margin-left:2px}
  .mom{font-size:10.5px; font-weight:800; border-radius:6px; padding:1px 5px; white-space:nowrap}
  .mom.up{color:#c2410c; background:#ffedd5}     /* 저점 증가/상승 = 악화 */
  .mom.down{color:#1a7f37; background:#dcfce7}   /* 저점 감소/하락 = 개선 */
  .mom.same{color:#8a94a6; background:#eef1f5}
  .mom.new{color:#7e22ce; background:#f3e8ff}
  .voc-sec-comment{margin-top:12px; border-top:1px dashed var(--line); padding-top:10px}
  .vsc-head{display:flex; align-items:center; justify-content:space-between; font-size:12.5px; font-weight:800; color:var(--gray); margin-bottom:6px}
  .btn.xs{font-size:11.5px; padding:4px 10px; border-radius:8px; background:var(--purple,#6E3FE5); color:#fff; border:none; cursor:pointer; font-family:inherit; font-weight:700}
  .btn.xs:hover{filter:brightness(1.08)}
  .voc-comment.sm{min-height:66px; font-size:13px}
  .vd-rpct{font-size:11px; font-weight:700; color:var(--gray2,#9AA0A6); margin-left:2px}
  .voc-drill-body{padding:2px 12px 12px; border-top:1px solid var(--line-soft)}
  .voc-drill-sum{display:flex; align-items:center; gap:10px; padding:11px 12px; margin-bottom:8px; cursor:pointer;
    border:1px solid var(--line-soft); border-radius:10px; background:var(--surface2); transition:.12s}
  .voc-drill-sum:hover{background:var(--canvas,#fff); border-color:var(--blue,#1F4FFA); box-shadow:0 2px 10px rgba(31,79,250,.12); transform:translateY(-1px)}
  .voc-drill-sum .vd-open{flex:0 0 auto; opacity:.45; font-size:13px}
  .voc-drill-sum:hover .vd-open{opacity:1}
  /* 큰 상세 모달 — 글씨 크게 */
  .vd-modal{max-width:min(920px,94vw); width:920px}
  .vd-modal-body{font-size:16px}
  .vd-modal-body .vd-reasons{margin-bottom:6px}
  .vd-modal-body .vd-reasons-h{font-size:16px; margin-bottom:12px}
  .vd-modal-body .vd-rname{font-size:15px}
  .vd-modal-body .vd-rcnt{font-size:15px; min-width:52px}
  .vd-modal-body .vd-rrow{margin-bottom:7px}
  .vd-modal-body .voc-detail-item{padding:13px 15px}
  .vd-modal-body .vd-store{font-size:16.5px}
  .vd-modal-body .vd-content,.vd-modal-body .vd-note{font-size:15px; line-height:1.6}
  .vd-modal-body .vd-content b,.vd-modal-body .vd-note b{font-size:12px}
  /* 매장별 상세 접힘(처음엔 이유만) */
  .vd-stores{margin-top:6px; border-top:1px dashed var(--line); padding-top:10px}
  .vd-stores summary{cursor:pointer; font-size:15px; font-weight:800; color:var(--blue,#1F4FFA); list-style:none; padding:8px 10px;
    background:#eef2ff; border-radius:10px; display:inline-block}
  .vd-stores summary::-webkit-details-marker{display:none}
  .vd-stores summary::before{content:'▸ '; font-size:12px}
  .vd-stores[open] summary::before{content:'▾ '}
  .vd-stores[open] summary{margin-bottom:10px}
  .vd-top{font-size:13px; color:var(--ink); background:var(--surface2); border:1px solid var(--line-soft); border-radius:8px; padding:8px 10px; margin:10px 0 8px}
  .vd-reasons{background:var(--canvas); border:1px solid var(--line-soft); border-radius:8px; padding:10px 11px; margin:10px 0 8px}
  .vd-reasons-h{font-size:12.5px; color:var(--ink); margin-bottom:9px}
  .vd-rrow{display:flex; align-items:center; gap:8px; margin:5px 0}
  .vd-rname{flex:0 0 45%; font-size:12.5px; color:var(--ink-soft); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .vd-rbar{flex:1; height:7px; background:var(--line-soft); border-radius:5px; overflow:hidden}
  .vd-rbar>span{display:block; height:100%; background:#ff9500; border-radius:5px}
  .vd-rcnt{flex:0 0 auto; font-size:12px; font-weight:800; color:var(--gray); min-width:30px; text-align:right}
  .voc-detail-list{display:flex; flex-direction:column; gap:8px}
  .voc-detail-item{background:var(--surface2); border:1px solid var(--line-soft); border-radius:9px; padding:9px 11px}
  .vd-head{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:5px}
  .vd-store{font-size:14px; font-weight:800; color:var(--ink)}
  .vd-id{font-size:11.5px; color:var(--gray2)}
  .vd-score{font-size:11.5px; font-weight:700; color:var(--red); background:var(--red-soft); padding:1px 8px; border-radius:20px}
  .vd-stat{font-size:11px; font-weight:700; padding:1px 8px; border-radius:20px; background:#e9ecef; color:#495057}
  .vd-stat.done{background:var(--green-soft); color:#166534}
  .vd-stat.hold{background:#fff4d6; color:#a8620a}
  .vd-stat.st-progress{background:#eef1f4; color:#475569}
  .vd-stat.st-done{background:#dbeafe; color:#1e40af}
  .vd-stat.st-ob{background:var(--green-soft); color:#166534}
  .vd-stat.st-absent{background:#ffe1de; color:#b91c1c}
  .vd-stat.st-reject{background:#ffedd5; color:#c2410c}
  .vd-content,.vd-note{font-size:13px; color:var(--ink-soft); line-height:1.5}
  .vd-note{margin-top:3px}
  .vd-content b,.vd-note b{font-size:10.5px; color:var(--gray); font-weight:800; margin-right:6px; letter-spacing:.02em}
  .vd-empty{color:var(--gray2)}
  /* 저점율 행 (사용기간/VAN) */
  .ratio-row{margin-bottom:13px}
  .ratio-head{display:flex; justify-content:space-between; align-items:baseline; gap:8px; margin-bottom:5px}
  .ratio-nm{font-size:14px; font-weight:700; color:var(--ink)}
  .ratio-val b{font-size:17px; font-weight:800}
  .ratio-sub{color:var(--gray2); font-size:12px; margin-left:6px}
  .ratio-track{height:10px; background:var(--line-soft); border-radius:6px; overflow:hidden}
  .ratio-fill{height:100%; border-radius:6px; transition:width .3s}
  .day-badge{display:inline-block; font-size:11px; font-weight:800; padding:2px 8px; border-radius:20px; background:var(--surface2); color:var(--gray); white-space:nowrap}
  .day-badge.today{background:var(--blue-soft); color:var(--blue)}
  .cnt-badge{display:inline-block; min-width:22px; text-align:center; background:var(--red-soft); color:var(--red);
    font-size:13px; font-weight:800; padding:1px 8px; border-radius:20px; margin-left:4px; vertical-align:middle}
  .cnt-badge.done{background:var(--green-soft); color:#166534}
  .voc-sel,.voc-note{width:100%; font-family:inherit; font-size:12.5px; padding:6px 8px; border:1px solid var(--line);
    border-radius:8px; background:var(--surface2); color:var(--ink)}
  .voc-sel:focus,.voc-note:focus{outline:none; border-color:var(--blue); background:#fff; box-shadow:0 0 0 3px var(--blue-soft)}
  /* 고객 원문 셀 클릭 → 상세 팝업 */
  .voc-rawtxt.clickable{cursor:pointer}
  .voc-rawtxt.clickable:hover{color:var(--blue)}
  .vdt-body{display:flex; flex-direction:column; gap:14px}
  .vdt-meta{font-size:12.5px; color:var(--gray); background:var(--surface2); border-radius:8px; padding:8px 11px}
  .vdt-sec .vdt-lab{font-size:13px; font-weight:800; color:var(--ink); margin-bottom:7px}
  .vdt-quote{font-size:14px; color:var(--ink-soft); line-height:1.6; background:var(--surface2); border-left:3px solid var(--red); border-radius:8px; padding:9px 12px; margin-bottom:7px; white-space:pre-wrap}
  .vdt-note{font-size:14px; color:var(--ink); line-height:1.6; background:#eef5ff; border-radius:8px; padding:10px 12px; white-space:pre-wrap}
  .vdt-empty{color:var(--gray2); font-size:13px}
  .navbtn.sub{padding:9px 13px 9px 30px; font-size:14px; color:var(--gray); font-weight:500}
  .navbtn.sub .ic{font-size:12px; color:var(--gray2)}
  .navbtn.sub.active{background:var(--blue-soft); color:var(--blue-deep); font-weight:700}
  .voc-comment{width:100%; min-height:130px; font-family:inherit; font-size:14px; line-height:1.65; padding:14px 16px;
    border:1px solid var(--line); border-radius:12px; background:var(--surface2); color:var(--ink); resize:vertical}
  .voc-comment:focus{outline:none; border-color:var(--blue); background:#fff; box-shadow:0 0 0 3px var(--blue-soft)}

  /* pending lookup */
  .search-box{width:100%; font-family:inherit; font-size:14px; padding:11px 14px; border:1px solid var(--line);
    border-radius:12px; background:var(--surface2); color:var(--ink); transition:.15s}
  .search-box:focus{outline:none; border-color:var(--blue); background:#fff; box-shadow:0 0 0 3px var(--blue-soft)}
  .trow-time{color:var(--gray2); font-size:13px; white-space:nowrap}
  .trow-biz{font-family:'SF Mono',ui-monospace,Menlo,Consolas,monospace; font-size:13px; color:var(--slate,#454b54)}
  .status-tag{display:inline-block; font-size:11px; font-weight:700; padding:3px 8px; border-radius:6px; margin:1px 2px 1px 0; white-space:nowrap}
  .status-tag.absent{background:var(--red-soft); color:var(--red)}
  .status-tag.unassigned{background:#fff4d6; color:#a8620a}

  /* mini trend bars in table */
  .spark{display:inline-flex; align-items:flex-end; gap:2px; height:22px}
  .spark i{width:5px; background:var(--blue-soft); border-radius:2px; display:block}
  .spark i.hi{background:var(--blue)}

  /* ===== Duty calendar ===== */
  .cal-toolbar{display:flex; align-items:center; gap:14px; margin-bottom:20px}
  .cal-toolbar .mtitle{font-size:22px; font-weight:700; letter-spacing:-.02em; min-width:150px}
  .navround{width:38px; height:38px; border-radius:50%; border:1px solid var(--line); background:var(--canvas);
    font-size:17px; cursor:pointer; color:var(--ink); display:inline-flex; align-items:center; justify-content:center}
  .navround:hover{background:var(--surface)}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:8px}
  .dow{font-size:12px; font-weight:700; text-align:center; padding:6px 0; color:var(--gray)}
  .dow.s-sat{color:var(--sat)} .dow.s-sun{color:var(--sun)}
  .daycell{background:var(--canvas); border:1px solid var(--line-soft); border-radius:14px; min-height:150px;
    padding:9px; display:flex; flex-direction:column; gap:6px}
  .daycell.empty{background:transparent; border:none}
  .daycell.today{border:2px solid var(--blue); box-shadow:0 0 0 3px var(--blue-soft)}
  .daycell.holi{background:var(--red-soft)}
  .dnum{font-size:16px; font-weight:800; display:flex; align-items:center; gap:5px}
  .dnum.s-sat{color:var(--sat)} .dnum.s-sun{color:var(--sun)}
  .holi-tag{font-size:10px; font-weight:700; color:var(--red); background:#fff; padding:1px 6px;
    border-radius:6px; border:1px solid var(--red-soft)}
  .duty-slot{display:flex; align-items:center; gap:6px}
  .slot-tag{font-size:10px; font-weight:800; letter-spacing:.02em; padding:3px 6px; border-radius:6px;
    flex:0 0 auto; width:38px; text-align:center}
  .slot-tag.day{background:#fff3cd; color:#946200}
  .slot-tag.aft{background:#d9edff; color:#0060c0}
  .slot-tag.nit{background:#e4e0ff; color:#4b45c0}

<!-- 슬랙 집계 데이터는 캐시 무효화하여 아래 스크립트에서 동적 로드 -->
<script>
/* ================= Config ================= */
const EMPLOYEES = ["김기범","서상원","김규빈","김동욱","송태양","김현기","배선유","최민석","심성현"];
// 공유 캘린더 — 직원별 고유 색상(흰 글씨가 잘 보이는 진한 톤)
const EMP_COLORS = {
  "김기범":"#1f6feb","서상원":"#2f9e44","김규빈":"#e8590c","김동욱":"#6741d9",
  "송태양":"#e03131","김현기":"#0c8599","배선유":"#9c36b5","최민석":"#c2255c","심성현":"#495057"
};
function empColor(n){ return EMP_COLORS[n] || "#495057"; }
// 회의 중 원격 근무 당번 순번 (정기회의·타운홀 공통, 순서대로 1명씩 남음)
const DUTY_ORDER = ["배선유","송태양","김동욱","김현기","서상원","김규빈","심성현"];
const DUTY_ANCHOR_DATE = "2026-07-10";   // 이 날 회의 = 김현기(순번 idx 3) 기준으로 전체 정렬
const DUTY_ANCHOR_IDX = 3;
const LS_DUTYALERT = "opcare_dutyalert_v1";
function isDutyMeeting(t){ return /정기회의|타운홀|town\s*hall/i.test(t||""); }
function meetingDutyList(){
  const days=(window.GCAL_DATA&&window.GCAL_DATA.days)||{}; const list=[];
  Object.keys(days).forEach(d=>(days[d]||[]).forEach(e=>{ if(isDutyMeeting(e.title)) list.push({date:d, time:e.time||"", title:e.title}); }));
  list.sort((a,b)=>(a.date+"|"+a.time).localeCompare(b.date+"|"+b.time));
  return list;
}
function dutyMap(){
  const list=meetingDutyList();
  let a=list.findIndex(m=>m.date===DUTY_ANCHOR_DATE);
  if(a<0){ a=list.findIndex(m=>m.date>=DUTY_ANCHOR_DATE); if(a<0) a=Math.max(0,list.length-1); }
  const map={};
  list.forEach((m,i)=>{ map[m.date+"|"+m.time+"|"+m.title]=DUTY_ORDER[(((i-a+DUTY_ANCHOR_IDX)%7)+7)%7]; });
  return map;
}
function meetingStart(m){
  const t=(m.time||"").split("~")[0].trim(); if(!/^\d{1,2}:\d{2}$/.test(t)) return null;
  const p=m.date.split("-").map(Number), q=t.split(":").map(Number);
  return new Date(p[0],p[1]-1,p[2],q[0],q[1],0,0);
}
// 30분 전 알림 체크(탭 열려 있을 때). 1분마다 호출됨.
function checkDutyAlert(){
  if(!window.GCAL_DATA) return;
  const now=new Date(), today=ymd(now), map=dutyMap(), alerted=load(LS_DUTYALERT,{});
  meetingDutyList().filter(m=>m.date===today).forEach(m=>{
    const st=meetingStart(m); if(!st) return;
    const diff=(st-now)/60000, key=m.date+"|"+m.time+"|"+m.title;
    if(diff>0 && diff<=30 && !alerted[key]){ alerted[key]=true; showDutyPopup(m, map[key], Math.max(1,Math.round(diff))); }
  });
  Object.keys(alerted).forEach(k=>{ if((k.split("|")[0]||"")<today) delete alerted[k]; });
  save(LS_DUTYALERT,alerted);
}
function showDutyPopup(m, person, mins){
  const ex=document.getElementById("dutyPop"); if(ex) ex.remove();
  const el=document.createElement("div"); el.id="dutyPop"; el.className="duty-pop-overlay";
  el.innerHTML=`<div class="duty-pop">
    <div class="duty-pop-ic">🏠</div>
    <div class="duty-pop-sub">${mins}분 후 시작</div>
    <div class="duty-pop-title">${escapeHtml(m.title)}</div>
    <div class="duty-pop-badge">이번 회의 원격 근무 당번</div>
    <div class="duty-pop-person">${escapeHtml(person||"-")}</div>
    <div class="duty-pop-time">🕒 ${escapeHtml(m.time||"")}</div>
    <button class="duty-pop-btn" onclick="document.getElementById('dutyPop').remove()">확인했어요 👍</button>
  </div>`;
  document.body.appendChild(el);
  try{ if(window.Notification && Notification.permission==="granted") new Notification(`🏠 ${m.title} ${mins}분 전`, {body:`원격 근무 당번: ${person}`}); }catch(e){}

/* ================= Date helpers ================= */
function today(){ return new Date(); }  // 실제 오늘 사용
function ymd(d){ const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${dd}`; }
function parseYmd(s){ const [y,m,dd]=s.split("-").map(Number); return new Date(y,m-1,dd); }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function startOfWeek(d){ const x=new Date(d); const dow=(x.getDay()+6)%7; return addDays(x,-dow); } // 월요일 시작
function fmtKDate(d){ const w=["일","월","화","수","목","금","토"][d.getDay()];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${w})`; }
function fmtShort(s){ const d=parseYmd(s); return `${d.getMonth()+1}/${d.getDate()}`; }
// 공용 기간 헬퍼 (어제/오늘/최근N일/기간)
function lastNDays(n){ const out=[]; for(let i=n-1;i>=0;i--) out.push(ymd(addDays(today(),-i))); return out; }
function dateRangeList(s,e){ let a=parseYmd(s), b=parseYmd(e); if(b<a){const t=a;a=b;b=t;} const out=[]; for(let d=new Date(a); d<=b; d=addDays(d,1)) out.push(ymd(d)); return out; }
function periodDates(mode, cStart, cEnd){
  if(mode==='yesterday') return [ymd(addDays(today(),-1))];
  if(mode==='d7') return lastNDays(7);
  if(mode==='d30') return lastNDays(30);
  if(mode==='range'||mode==='custom') return dateRangeList(cStart, cEnd);
  return [ymd(today())]; // today
}
function periodRangeText(dates){ if(!dates.length) return ''; return dates.length===1?fmtShort(dates[0]):`${fmtShort(dates[0])} ~ ${fmtShort(dates[dates.length-1])} (${dates.length}일)`; }

  if(it.ach==='phoenix'){ const toMin=t=>{ const p=(t||'').split(':'); return (+p[0]||0)*60+(+p[1]||0); }; let ok=false, bestSpan=0; monthSlackDates().forEach(d=>{ const ts=((slackDay(d)||{}).done||[]).filter(x=>x.emp===emp&&x.time).map(x=>toMin(x.time)); if(ts.length>=2){ const span=Math.max(...ts)-Math.min(...ts); if(span>bestSpan) bestSpan=span; if(span>=720) ok=true; } }); return {ok, label:'하루 원격 처리 이력 12시간 이상 (첫~마지막 처리 간격)', prog:ok?'달성 ✓':`최고 ${Math.floor(bestSpan/60)}시간 ${bestSpan%60}분/12시간`}; }
  if(it.ach==='master'){ let ok=false; const W=['onboarding','as','transfer','menu','delivery','extern']; monthSlackDates().forEach(d=>{ const day=slackDay(d)||{}; const dn=(day.done||[]).filter(x=>x.emp===emp); const cs=new Set(dn.map(x=>x.cat)); const all6=W.every(c=>cs.has(c)); const voc=day.voc?[...(day.voc.alerts||[]),...(day.voc.praises||[])].some(x=>x.emp===emp&&x.doneDate===d):false; const anyPending=(day.pending||[]).some(p=>p.handler===emp); if(all6&&voc&&!anyPending) ok=true; }); return {ok, label:'하루에 온보딩·AS·명변·메뉴·배달·외주·VOC 각 1건 이상 + 부재·미처리 0건', prog:ok?'달성 ✓':'미달'}; }
  if(it.ach==='god'){ const best=Math.max(0,...Object.values(empWorkByDay(emp))); const mvp=mvpCountOf(emp); return {ok:best>=50&&mvp>=10, label:'하루 50건 이상 처리 + MVP 10회 이상 선정', prog:`하루최고 ${best}/50 · MVP ${mvp}/10`}; }

/* ================= Count data access ================= */
function getCount(cat, date, emp){ return (COUNTS[cat] && COUNTS[cat][date] && COUNTS[cat][date][emp]) || 0; }
function setCount(cat, date, emp, n){
  if(!COUNTS[cat]) COUNTS[cat]={};
  if(!COUNTS[cat][date]) COUNTS[cat][date]={};
  if(n>0) COUNTS[cat][date][emp]=n; else delete COUNTS[cat][date][emp];
  save(LS_COUNT, COUNTS);
}
function rangeDates(mode, refStr){
  if(mode==="custom"){
    const out=[]; let s=parseYmd(rangeStart), e=parseYmd(rangeEnd);
    if(e<s){ const t=s; s=e; e=t; }               // 뒤집혀 선택돼도 정상 처리
    for(let d=new Date(s); d<=e; d=addDays(d,1)) out.push(ymd(d));
    return out;
  }
  const ref = parseYmd(refStr); const out=[];
  if(mode==="day"){ out.push(refStr); }
  else if(mode==="week"){ const s=startOfWeek(ref); for(let i=0;i<7;i++) out.push(ymd(addDays(s,i))); }
  else { const y=ref.getFullYear(), m=ref.getMonth(), last=new Date(y,m+1,0).getDate();
    for(let i=1;i<=last;i++) out.push(ymd(new Date(y,m,i))); }
  return out;
}

function sumRange(cat, dates, emp){
  return dates.reduce((a,d)=>{
    if(emp) return a + getCount(cat,d,emp);
    const day = COUNTS[cat] && COUNTS[cat][d] ? Object.values(COUNTS[cat][d]).reduce((x,y)=>x+y,0) : 0;
    return a + day;
  }, 0);
}

function loadCloud(cb){

    if(b){
      if(b._v||b.players){   // 신규 통합 포맷 — 파괴적 덮어쓰기 대신 병합
        const rp={};
        const mP=mergeCloudDict(GAME,b.players);       GAME=mP.merged;       if(Object.keys(mP.restore).length) rp.players=mP.restore;
        const mE=mergeCloudDict(VOCEDIT,b.vocEdit);     VOCEDIT=mE.merged;     if(Object.keys(mE.restore).length) rp.vocEdit=mE.restore;
        const mR=mergeCloudDict(VOCPRAISE,b.vocPraise); VOCPRAISE=mR.merged;   if(Object.keys(mR.restore).length) rp.vocPraise=mR.restore;
        const mC=mergeCloudDict(VOCCOMMENT,b.vocComment);VOCCOMMENT=mC.merged; if(Object.keys(mC.restore).length) rp.vocComment=mC.restore;
        const mD=mergeCloudDict(DUTYOVER,b.dutyOver);   DUTYOVER=mD.merged;    if(Object.keys(mD.restore).length) rp.dutyOver=mD.restore;
        if(Object.keys(rp).length) pushPatch(rp);      // 로컬에만 있던 데이터를 클라우드에 복원
      } else { GAME=mergeCloudDict(GAME,b).merged; }   // 구 포맷(게임 데이터만)
      save(LS_GAME,GAME); save(LS_VOCEDIT,VOCEDIT); save(LS_VOCPRAISE,VOCPRAISE); save(LS_VOCCOMMENT,VOCCOMMENT); save(LS_DUTYOVER,DUTYOVER);

async function requireAuth(emp){
  if(!GAME_API) return true;             // 클라우드 미설정 시 통과
  if(isGameAuthed(emp)) return true;
  const st=await authGet({action:'status', emp});
  if(st&&st.hasPin){
    for(let tries=0; tries<3; tries++){
      const pin=prompt(`🔒 ${emp} 님 PIN 입력 (코인 사용 인증)`);
      if(pin===null) return false;
      const r=await authGet({action:'checkPin', emp, pin});
      if(r&&r.locked){ alert('⛔ PIN 5회 실패로 잠겼습니다. 10분 뒤 다시 시도하세요.'); return false; }
      if(r&&r.ok){ setGameAuthed(emp); return true; }
      if(tries<2 && !confirm('PIN이 틀렸어요. 다시 입력할까요?\n(취소 → PIN 재설정)')){ return resetPinFlow(emp); }
    }
    return resetPinFlow(emp);
  }
  return setupPinFlow(emp);
}
async function setupPinFlow(emp){

let celebrateMvp = true;
function fireMvpConfetti(){
  const card=document.getElementById('mvpCard'); if(!card) return;

  for(let i=0;i<40;i++){
    const s=document.createElement('span'); s.className='confetti';
    const ang=Math.random()*Math.PI*2, dist=50+Math.random()*130;
    s.style.setProperty('--dx',(Math.cos(ang)*dist).toFixed(0)+'px');
    s.style.setProperty('--dy',(Math.sin(ang)*dist).toFixed(0)+'px');
    s.style.setProperty('--rot',(Math.random()*720-360).toFixed(0)+'deg');

    s.style.animationDelay=(Math.random()*0.18).toFixed(2)+'s';

// hex + alpha → rgba
function hexA(hex,a){ const n=parseInt(hex.slice(1),16); return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`; }
// 카테고리 라벨/칩
function catLabelOf(k){ if(k==='voc')return 'VOC'; const c=WORK_CATS.find(w=>w.key===k); return c?c.name:k; }
function catChip(k){ const c=WORK_CATS.find(w=>w.key===k); const col=k==='voc'?'#ff2d55':(c?c.color:'#8e8e93'); return `<span class="cat-chip" style="background:${hexA(col,.14)};color:${col}">${catLabelOf(k)}</span>`; }
// 처리 상세 모달: mode='cat'(카테고리별) 또는 'emp'(직원별) — 상호/사업자/유형/담당 조회
function detailStatusBadge(st){ const col={'처리':'#166534','부재':'#b91c1c','확인필요':'#c2410c'}[st]||'#475569', bg={'처리':'#dcfce7','부재':'#ffe1de','확인필요':'#ffedd5'}[st]||'#eef1f5'; return `<span class="dm-st" style="background:${bg};color:${col}">${st}</span>`; }
function showDoneDetail(mode, key){
  const dates=ovDates(), set=new Set(dates); let items=[], title='';
  const pushVocDone=(empFilter)=>{ allSlackDates().forEach(d=>{ const v=(slackDay(d)||{}).voc; if(!v)return; [...(v.alerts||[]),...(v.praises||[])].forEach(x=>{ if(x.emp&&(!empFilter||x.emp===empFilter)&&x.doneDate&&set.has(x.doneDate)) items.push({time:'',store:x.store,biz:x.storeId,emp:x.emp,cat:'voc',date:x.doneDate,st:'처리',nt:isNightTime(x.time)}); }); }); };
  if(mode==='cat'){

  body.innerHTML=`${summary}<div style="overflow-x:auto"><table class="voc-table" style="margin-top:12px"><thead><tr><th style="width:62px">인입일</th><th style="min-width:100px">상호</th><th style="width:72px">유형</th><th style="width:58px">담당</th><th style="width:70px">상태</th><th style="min-width:150px">처리내역</th></tr></thead><tbody>${trs}</tbody></table></div>`;

// 전체 처리 추이 (기간 내 일별 전 카테고리 합계)
function overviewTrend(dates){
  const NIGHT=ovShift==='night', vocDB=NIGHT?null:vocDoneByDay();
  const vals=dates.map(d=>{ if(NIGHT) return nightItems([d]).length; const vp=vocDB[d]||0; const ab=((slackDay(d)||{}).pending||[]).filter(p=>(p.reasons||[]).some(r=>/부재/.test(r))).length; return WORK_CATS.reduce((a,c)=>a+sumRange(c.key,[d]),0)+vp+ab; });   // 업무 + VOC 처리(완료일 기준) + 부재 미처리 = 원격 총 건수와 동일 기준 (야간이면 야간 항목 수)
  const mx=Math.max(1,...vals);
  const gapUnit=Math.min(60,Math.max(28,720/dates.length));
  const W=Math.max(520,dates.length*gapUnit), H=200, pad=26, gap=(W-pad*2)/dates.length, bw=gap*0.6;
  const many=dates.length>16;
  const bars=dates.map((d,i)=>{ const v=vals[i], h=(H-46)*(v/mx), x=pad+i*gap+(gap-bw)/2, y=H-28-h, dd=parseYmd(d), isT=d===ymd(today());
    const lbl=many?dd.getDate():`${dd.getMonth()+1}/${dd.getDate()}`;
    return `<rect x="${x}" y="${y.toFixed(1)}" width="${bw}" height="${h.toFixed(1)}" rx="4" fill="${isT?'var(--blue)':'#cfe3fb'}"></rect>`
      +(v>0?`<text x="${x+bw/2}" y="${(y-5).toFixed(1)}" text-anchor="middle" font-size="10.5" font-weight="700" fill="#424245">${v}</text>`:'')
      +`<text x="${x+bw/2}" y="${H-11}" text-anchor="middle" font-size="9.5" fill="#86868b">${lbl}</text>`;}).join('');
  return `<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}"><line x1="${pad}" y1="${H-28}" x2="${W-pad}" y2="${H-28}" stroke="var(--line)"/>${bars}</svg></div>`;
}
// 시간대별 처리 추이 — done(처리완료) 항목을 인입 시각(HH) 시간대로 버킷팅
function overviewHourly(dates){
  const NIGHT=ovShift==='night';
  const buckets=new Array(24).fill(0);
  for(const d of dates){ const dn=slackDay(d); if(!dn||!dn.done) continue;
    for(const it of dn.done){ const h=parseInt(String(it.time||'').slice(0,2),10); if(isNaN(h)) continue; if(NIGHT&&h<18) continue; buckets[h]++; } }
  const withData=[]; for(let h=0;h<24;h++) if(buckets[h]>0) withData.push(h);
  if(!withData.length) return '<div class="empty-note">시간대별 처리 데이터 없음</div>';
  let lo=Math.min(...withData), hi=Math.max(...withData);
  if(NIGHT){ lo=Math.min(lo,18); hi=Math.max(hi,22); } else { lo=Math.min(lo,9); hi=Math.max(hi,18); }   // 축 최소 범위 유지
  const hrs=[]; for(let h=lo;h<=hi;h++) hrs.push(h);
  const vals=hrs.map(h=>buckets[h]);
  const mx=Math.max(1,...vals);
  const gapUnit=Math.min(58,Math.max(30,720/hrs.length));
  const W=Math.max(520,hrs.length*gapUnit), H=200, pad=26, gap=(W-pad*2)/hrs.length, bw=gap*0.6;
  const bars=hrs.map((h,i)=>{ const v=vals[i], bh=(H-46)*(v/mx), x=pad+i*gap+(gap-bw)/2, y=H-28-bh;
    return `<rect x="${x}" y="${y.toFixed(1)}" width="${bw}" height="${bh.toFixed(1)}" rx="4" fill="#4a90e2"><title>${h}시~${h+1}시: ${v}건</title></rect>`
      +(v>0?`<text x="${x+bw/2}" y="${(y-5).toFixed(1)}" text-anchor="middle" font-size="10.5" font-weight="700" fill="#424245">${v}</text>`:'')
      +`<text x="${x+bw/2}" y="${H-11}" text-anchor="middle" font-size="9.5" fill="#86868b">${h}시</text>`;}).join('');
  return `<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}"><line x1="${pad}" y1="${H-28}" x2="${W-pad}" y2="${H-28}" stroke="var(--line)"/>${bars}</svg></div>`;
}
// 도넛 차트
function donutChart(entries){
  const total=entries.reduce((a,e)=>a+e[1],0);
  if(!total) return '<div class="empty-note">데이터 없음</div>';
  const cx=72,cy=72,rm=50,C=2*Math.PI*rm,sw=22; let acc=0;
  const segs=entries.map(([label,val,color])=>{ const len=val/total*C; const s=`<circle cx="${cx}" cy="${cy}" r="${rm}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}" stroke-dashoffset="${(-acc).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"><title>${label} ${val} (${Math.round(val/total*100)}%)</title></circle>`; acc+=len; return s; }).join('');
  const legend=entries.map(([label,val,color])=>`<span><span class="swatch" style="background:${color}"></span>${label} ${val} (${Math.round(val/total*100)}%)</span>`).join('');
  return `<div style="display:flex;gap:22px;align-items:center;flex-wrap:wrap">
    <svg viewBox="0 0 144 144" width="144" height="144" style="flex:0 0 auto">${segs}
      <text x="72" y="70" text-anchor="middle" font-size="26" font-weight="800" fill="#1d1d1f">${total}</text>
      <text x="72" y="88" text-anchor="middle" font-size="11" fill="#86868b">총 건수</text></svg>
    <div class="legend" style="flex-direction:column;gap:7px;align-items:flex-start;margin:0">${legend}</div></div>`;
}
// ── AS 유형 분류 — 요청 '내용'(req) + 처리내역(note) 키워드 기반 ──

];
const AS_ISSUE_ETC='기타';
const AS_ISSUE_COLOR={'프론트/터미널':'#0071e3','포스/키오스크':'#34c759','프린터':'#5e5ce6','CAT/무선단말기':'#ff9500','네트워크/연동':'#00c7be','기타':'#8e8e93'};
function classifyAsIssue(text){ const t=(text||'').toLowerCase(); for(const r of AS_ISSUE_RULES){ if(r.kw.some(k=>t.includes(k.toLowerCase()))) return r.label; } return AS_ISSUE_ETC; }
function asIssueRows(dates){ const rows=[]; for(const d of dates){ const dd=slackDay(d)||{}; (dd.done||[]).forEach(x=>{ if(x.cat!=='as')return; rows.push({date:d,time:x.time,store:x.store,emp:x.emp,req:x.req||'',note:x.note||'',issue:classifyAsIssue((x.req||'')+' '+(x.note||''))}); }); } return rows; }
function asIssueBreakdown(dates){
  const rows=asIssueRows(dates); const total=rows.length;
  if(!total) return '<div class="empty-note">이 기간 AS 처리 건이 없습니다</div>';

  const entries=order.map(l=>[l,counts[l]||0]).filter(e=>e[1]>0).sort((a,b)=>b[1]-a[1]);

  return `<div class="as-brk">${entries.map(([l,n])=>`<div class="as-brk-row" onclick="showAsIssueDetail('${encodeURIComponent(l)}')" title="클릭 → 매장 목록">

function prevViewDates(){
  if(viewMode==='day')   return rangeDates('day',  ymd(addDays(parseYmd(selDate),-1)));
  if(viewMode==='week')  return rangeDates('week', ymd(addDays(startOfWeek(parseYmd(selDate)),-7)));

  const cur=rangeDates('custom',selDate), len=cur.length||1, start=parseYmd(cur[0]), out=[];

function deltaHTML(cur,prev){

// 직원별 그룹(묶음) 세로 막대차트 — 직원마다 카테고리별 막대를 분리 표시
function columnChart(empRows, maxCell){
  const cats=WORK_CATS, nc=cats.length, ng=empRows.length;
  const barW=12, barGap=3, groupGap=32, padL=20, padR=20, topPad=22, botPad=46;
  const groupW=nc*barW+(nc-1)*barGap;
  const W=Math.max(560, padL+padR + ng*groupW + (ng-1)*groupGap);
  const H=340, base=H-botPad, plotH=H-topPad-botPad;
  const mx=Math.max(1, maxCell);
  const groups=empRows.map((r,gi)=>{
    const gx=padL + gi*(groupW+groupGap);
    const bars=cats.map((c,ci)=>{
      const v=r.cells[ci];
      const bx=gx+ci*(barW+barGap);
      if(v<=0) return `<rect x="${bx}" y="${base-2}" width="${barW}" height="2" rx="1" fill="#ececf0"/>`;
      const h=v/mx*plotH, y=base-h;
      return `<rect x="${bx}" y="${y.toFixed(1)}" width="${barW}" height="${h.toFixed(1)}" rx="2.5" fill="${c.color}"><title>${r.emp} · ${c.name} ${v}건</title></rect>`
        + `<text x="${bx+barW/2}" y="${(y-4).toFixed(1)}" text-anchor="middle" font-size="10" font-weight="700" fill="#424245">${v}</text>`;
    }).join("");
    const sep = gi>0 ? `<line x1="${(gx-groupGap/2).toFixed(1)}" y1="${topPad}" x2="${(gx-groupGap/2).toFixed(1)}" y2="${base}" stroke="#f2f2f5"/>` : "";
    const name = `<text x="${gx+groupW/2}" y="${base+22}" text-anchor="middle" font-size="13" font-weight="700" fill="#1d1d1f">${r.emp}</text>`;
    const tot = `<text x="${gx+groupW/2}" y="${base+38}" text-anchor="middle" font-size="11" font-weight="600" fill="#86868b">합계 ${r.total}</text>`;
    return sep+bars+name+tot;
  }).join("");
  return `<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
    <line x1="${padL-8}" y1="${base}" x2="${W-padR+8}" y2="${base}" stroke="#d2d2d7"/>
    ${groups}
  </svg></div>`;
}
// 단일 카테고리 세로 막대차트 (직원별) — 외주 등
function simpleColumn(pairs, color){
  const n=pairs.length, colW=42, gap=24, padL=18, padR=18, topPad=24, botPad=42;
  const W=Math.max(360, padL+padR + n*colW + (n-1)*gap);
  const H=230, base=H-botPad, plotH=H-topPad-botPad;
  const mx=Math.max(1, ...pairs.map(p=>p[1]));
  const bars=pairs.map(([nm,v],i)=>{
    const x=padL + i*(colW+gap), h=v/mx*plotH, y=base-h;
    return `<rect x="${x}" y="${y.toFixed(1)}" width="${colW}" height="${h.toFixed(1)}" rx="3" fill="${color}"><title>${nm} ${v}건</title></rect>`
      + `<text x="${x+colW/2}" y="${(y-6).toFixed(1)}" text-anchor="middle" font-size="13" font-weight="800" fill="#1d1d1f">${v}</text>`
      + `<text x="${x+colW/2}" y="${base+19}" text-anchor="middle" font-size="12.5" font-weight="600" fill="#424245">${nm}</text>`;
  }).join("");
  return `<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}"><line x1="${padL-6}" y1="${base}" x2="${W-padR+6}" y2="${base}" stroke="#d2d2d7"/>${bars}</svg></div>`;
}

// 기간 내 VOC 집계 합산
function aggVoc(dates){
  const agg={responses:0,install:{count:0,low:0},nps:{count:0,low:0},high:{install:0,nps:0},npsDist:{},installDist:{},byIndustry:{},byTenure:{},byVan:{},reasonCounts:{},alerts:[],praises:[]};
  const mergePair=(dst,src)=>{ for(const k in (src||{})){ if(!dst[k])dst[k]={total:0,low:0}; dst[k].total+=src[k].total||0; dst[k].low+=src[k].low||0; } };
  dates.forEach(d=>{ const v=(slackDay(d)||{}).voc; if(!v) return;
    agg.responses+=v.responses||0;
    if(v.install){agg.install.count+=v.install.count||0; agg.install.low+=v.install.low||0;}
    if(v.nps){agg.nps.count+=v.nps.count||0; agg.nps.low+=v.nps.low||0;}
    if(v.high){agg.high.install+=v.high.install||0; agg.high.nps+=v.high.nps||0;}
    for(const k in (v.npsDist||{})) agg.npsDist[k]=(agg.npsDist[k]||0)+v.npsDist[k];
    for(const k in (v.installDist||{})) agg.installDist[k]=(agg.installDist[k]||0)+v.installDist[k];
    for(const k in (v.byIndustry||{})) agg.byIndustry[k]=(agg.byIndustry[k]||0)+v.byIndustry[k];
    for(const k in (v.reasonCounts||{})) agg.reasonCounts[k]=(agg.reasonCounts[k]||0)+v.reasonCounts[k];
    mergePair(agg.byTenure, v.byTenure); mergePair(agg.byVan, v.byVan);
    (v.alerts||[]).forEach(a=>agg.alerts.push(Object.assign({date:d},a)));
    (v.praises||[]).forEach(p=>agg.praises.push(Object.assign({date:d},p)));
  });
  return agg;
}
// NPS 지표 계산
function vocNpsStats(dist){
  let total=0,prom=0,pass=0,det=0,sum=0;
  for(const k in dist){ const s=+k,c=dist[k]; total+=c; sum+=s*c; if(s>=9)prom+=c; else if(s>=7)pass+=c; else det+=c; }
  return {total,prom,pass,det, nps: total?Math.round((prom-det)/total*100):0, avg: total?(sum/total):0};
}
function avgScore(dist){ let t=0,s=0; for(const k in dist){t+=dist[k]; s+=(+k)*dist[k];} return t?(s/t):0; }
// 점수 분포 세로 막대
function distColumnChart(dist, maxScore, colorFn){
  const scores=[]; for(let i=0;i<=maxScore;i++) scores.push(i);
  const counts=scores.map(s=>dist[s]||0), mx=Math.max(1,...counts);
  const n=scores.length, bw=Math.max(20,Math.min(46,Math.floor(560/n))-8), gap=10, padL=16,padR=16,H=160,base=H-28,plotH=H-44;
  const W=Math.max(360, padL+padR+n*(bw+gap));
  const bars=scores.map((s,i)=>{const c=counts[i],h=c/mx*plotH,x=padL+i*(bw+gap),y=base-h;
    return `<rect x="${x}" y="${y.toFixed(1)}" width="${bw}" height="${h.toFixed(1)}" rx="3" fill="${colorFn(s)}"></rect>`
      +(c>0?`<text x="${x+bw/2}" y="${(y-4).toFixed(1)}" text-anchor="middle" font-size="10" font-weight="700" fill="#424245">${c}</text>`:'')
      +`<text x="${x+bw/2}" y="${base+15}" text-anchor="middle" font-size="10.5" font-weight="600" fill="#86868b">${s}</text>`;}).join('');
  return `<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}"><line x1="${padL-4}" y1="${base}" x2="${W-padR+4}" y2="${base}" stroke="#d2d2d7"/>${bars}</svg></div>`;
}

function vocEffStatus(a){ const ed=VOCEDIT[vocKey(a)]||{}; return ed.status || a.autoStatus || '처리중'; }
function vocEffNote(a){ const ed=VOCEDIT[vocKey(a)]||{}; return ed.note!=null?ed.note:(a.autoNote||''); }
function vocAlertInfo(alerts){
  return (alerts||[]).map(a=>{ const ed=VOCEDIT[vocKey(a)]||{}; const st=ed.status||a.autoStatus||'처리중';
    return { store:a.store||'-', storeId:a.storeId||'',

      rea: ed.reasonCat||(a.reasons[0]&&a.reasons[0].cat)||VOC_REASONS[5],

      note: ed.note!=null?ed.note:(a.autoNote||''), status:st, statCls:vocStatColorCls(st),
      score:`${a.install!=null?'설치'+a.install:''}${a.install!=null&&a.nps!=null?'·':''}${a.nps!=null?'추천'+a.nps:''}` }; });
}
function vocGroupEntries(alerts, key){ const g={}; vocAlertInfo(alerts).forEach(x=>{(g[x[key]]=g[x[key]]||[]).push(x);}); return Object.entries(g).sort((a,b)=>b[1].length-a[1].length); }
// ── VOC 저점 매장 필터(업종·저점이유) — VOCEDIT 수정값 우선, vocAlertInfo와 동일 기준 ──
function alertInd(a){ const ed=VOCEDIT[vocKey(a)]||{}; return ed.industry||a.indBucket||'미지정'; }
function alertRea(a){ const ed=VOCEDIT[vocKey(a)]||{}; return ed.reasonCat||(a.reasons&&a.reasons[0]&&a.reasons[0].cat)||VOC_REASONS[5]; }
function vocPassFilter(a){ return (!vocFilterInd||alertInd(a)===vocFilterInd)&&(!vocFilterRea||alertRea(a)===vocFilterRea); }
function setVocInd(v){ vocFilterInd=v; renderVoc(); }
function setVocRea(v){ vocFilterRea=v; renderVoc(); }
function clearVocFilter(){ vocFilterInd=''; vocFilterRea=''; renderVoc(); }
function vocFilterControls(){

// 응답 대비 저점율 행 (예: 저점 6/21 = 29%)
function ratioRow(name, low, total){

// 매장 상세 리스트 (매장명 · 저점내용 · 해결내용 · 상태)
function storeDetailList(items){

// 업종/사유 드릴다운(클릭 시 매장 상세 펼침). topReason=true면 '가장 많은 이유' 요약 표시
let VOCDRILL={}, vdSeq=0;   // 업종/이유 클릭 → 큰 모달로 보여줄 상세 저장
// 전월 대비 비교 맵: {name:{isNew}|{rankDelta,pctDelta}}  (저점이라 ↑=악화(빨강), ↓=개선(파랑))
function buildMoMCmp(cur, prev, total, prevTotal){
  const pr={}, pp={}; prev.forEach(([n,it],i)=>{ pr[n]=i+1; pp[n]=Math.round(it.length/(prevTotal||1)*100); });
  const m={};
  cur.forEach(([n,it],i)=>{ const cr=i+1, cp=Math.round(it.length/(total||1)*100);
    m[n] = (pr[n]==null) ? {isNew:true, pctDelta:cp} : {rankDelta:pr[n]-cr, pctDelta:cp-pp[n], prevRank:pr[n]}; });
  return m;
}
function momBadge(c){
  if(!c) return '<span class="mom-wrap"><span class="mom same" title="전월 데이터 없음">–</span></span>';
  if(c.isNew) return '<span class="mom-wrap"><span class="mom new" title="전월 미인입 신규">NEW</span></span>';
  const rd=c.rankDelta, pd=c.pctDelta;
  const rank = rd>0?`<span class="mom up" title="순위 ${rd}단계 상승(악화)">▲${rd}</span>`:rd<0?`<span class="mom down" title="순위 ${-rd}단계 하락(개선)">▼${-rd}</span>`:`<span class="mom same" title="순위 동일">순위=</span>`;
  const pct = pd>0?`<span class="mom up" title="비중 ${pd}%p 증가">+${pd}%p</span>`:pd<0?`<span class="mom down" title="비중 ${-pd}%p 감소">${pd}%p</span>`:`<span class="mom same">0%p</span>`;
  return `<span class="mom-wrap">${rank}${pct}</span>`;
}
function vocGroupDrill(entries, max, color, topReason, cmp){
  const total=entries.reduce((a,e)=>a+e[1].length,0)||1;   // 전체 모수(인입 합계)
  return entries.map(([name, items])=>{
    const cnt=items.length, pct=Math.round(cnt/total*100);
    let topLine='';
    if(topReason){
      const rc={}; items.forEach(x=>rc[x.rea]=(rc[x.rea]||0)+1);
      const rows=Object.entries(rc).sort((a,b)=>b[1]-a[1]);
      const rmax=Math.max(1,...rows.map(r=>r[1]));
      topLine=`<div class="vd-reasons">
        <div class="vd-reasons-h">🥇 가장 많은 이유: <b>${escapeHtml(rows[0][0].split('(')[0])}</b> (${rows[0][1]}건, ${Math.round(rows[0][1]/cnt*100)}%) · 전체 이유 ${rows.length}개</div>
        ${rows.map(([r,c])=>`<div class="vd-rrow"><span class="vd-rname" title="${escapeHtml(r)}">${escapeHtml(r.split('(')[0])}</span><span class="vd-rbar"><span style="width:${c/rmax*100}%"></span></span><span class="vd-rcnt">${c}건 <span class="vd-rpct">${Math.round(c/cnt*100)}%</span></span></div>`).join('')}
      </div>`;
    }
    const nm=name.split('(')[0], id='vd'+(vdSeq++);
    // 업종 드릴은 처음 화면에 '인입 이유'만 보이게 → 매장별 상세는 접어둠(클릭 시 펼침). 이유별 드릴은 매장 상세를 바로 표시.
    const bodyHtml = topLine
      ? `${topLine}<details class="vd-stores"><summary>🏪 매장별 상세 보기 (${cnt}곳)</summary>${storeDetailList(items)}</details>`
      : storeDetailList(items);
    VOCDRILL[id]={title:nm, cnt, pct, icon:topReason?'🏭':'😟', html:bodyHtml};
    return `<div class="voc-drill-sum" onclick="showVocDrill('${id}')" title="클릭 → 크게 보기">
      <span class="vd-name">${escapeHtml(nm)}</span><span class="vd-bar"><span class="vd-fill" style="width:${cnt/max*100}%;background:${color}"></span></span><span class="vd-cnt">${cnt}건 <span class="vd-pct">${pct}%</span></span>${cmp?momBadge(cmp[name]):''}<span class="vd-open">🔍</span>
    </div>`;
  }).join('');
}
function showVocDrill(id){ const d=VOCDRILL[id]; if(!d) return;
  let el=document.getElementById('vocDrillModal'); if(!el){ el=document.createElement('div'); el.id='vocDrillModal'; el.className='detail-overlay'; el.onclick=e=>{ if(e.target===el) el.remove(); }; document.body.appendChild(el); }
  el.innerHTML=`<div class="detail-box vd-modal"><div class="detail-head"><h3>${d.icon||'🔎'} ${escapeHtml(d.title)} <span class="cnt-badge">${d.cnt}건 · ${d.pct}%</span></h3><button class="detail-x" onclick="document.getElementById('vocDrillModal').remove()">✕</button></div><div class="detail-scroll vd-modal-body">${d.html}</div></div>`;
}
// ── 업종/이유 섹션 자동 코멘트(데이터 분석 기반) + 코멘트 칸 ──
let VOCMOMDATA=null;   // renderVocMonthly가 채우는 스냅샷(자동 코멘트 재생성용)
function autoComment(entries, cmp, total, kind){
  if(!entries || !entries.length) return `이번 달 ${kind}별 저점 인입이 없습니다.`;
  const nm=e=>e[0].split('(')[0];
  const t=entries[0], tn=nm(t), tc=t[1].length, tp=Math.round(tc/(total||1)*100), c=cmp[t[0]]||{};
  let s=`이번 달 ${kind}별 저점은 '${tn}' ${tc}건(${tp}%)으로 1위입니다.`;
  if(c.isNew) s+=` 전월엔 없던 신규 최다 항목이라 원인 점검이 필요합니다.`;
  else if(c.rankDelta>0) s+=` 전월 대비 ${c.rankDelta}단계 상승했습니다.`;
  else if(c.rankDelta<0) s+=` 전월 대비 ${-c.rankDelta}단계 내렸지만 여전히 1위입니다.`;
  else s+=` 전월과 같은 1위입니다.`;
  if(c.pctDelta>0) s+=` 비중은 전월比 ${c.pctDelta}%p 증가.`;
  else if(c.pctDelta<0) s+=` 비중은 전월比 ${-c.pctDelta}%p 감소.`;
  const arr=entries.map(e=>({n:nm(e), c:cmp[e[0]]||{}}));
  const rise=arr.filter(x=>!x.c.isNew && (x.c.pctDelta||0)>=5 && x.n!==tn).sort((a,b)=>b.c.pctDelta-a.c.pctDelta)[0];
  if(rise) s+=` 특히 '${rise.n}'이 ${rise.c.pctDelta}%p 급증해 주의가 필요합니다.`;
  const news=arr.filter(x=>x.c.isNew && x.n!==tn).map(x=>x.n).slice(0,2);
  if(news.length) s+=` 신규 유입: ${news.join(', ')}.`;
  const fall=arr.filter(x=>(x.c.pctDelta||0)<=-5 && x.n!==tn).sort((a,b)=>a.c.pctDelta-b.c.pctDelta)[0];
  if(fall) s+=` 반면 '${fall.n}'은 ${-fall.c.pctDelta}%p 감소해 개선세입니다.`;
  return s;
}
function vocSecCommentBox(type, mkey, entries, cmp, total, kind){
  const key=mkey+'|'+type, saved=VOCCOMMENT[key];
  const shown=(saved!=null&&saved!=='')?saved:autoComment(entries,cmp,total,kind);
  return `<div class="voc-sec-comment">
    <div class="vsc-head"><span>💬 코멘트</span><button class="btn xs" onclick="genVocSecComment('${type}')" title="전월 대비 데이터로 코멘트 자동 작성">🤖 자동 코멘트 생성</button></div>
    <textarea class="voc-comment sm" id="vsc-${type}" placeholder="전월 대비 인사이트를 적거나 AI 자동 생성을 눌러보세요 (자동 저장)" onchange="saveVocComment('${key}', this.value)">${escapeHtml(shown)}</textarea>
  </div>`;
}
function genVocSecComment(type){
  const d=VOCMOMDATA; if(!d) return;
  const src = type==='ind' ? {e:d.indEntries, c:d.indCmp, k:'업종'} : {e:d.reaEntries, c:d.reaCmp, k:'이유'};
  const txt = autoComment(src.e, src.c, d.total, src.k);
  const ta=document.getElementById('vsc-'+type); if(ta){ ta.value=txt; saveVocComment(d.mkey+'|'+type, txt); }
}

      <div class="vday-grid">${lastNDays(10).map(d=>{ const n=vDoneByDay[d]||0; return `<div class="vday${n>0?' has':''}"><div class="vday-n">${n}</div><div class="vday-d">${fmtShort(d)}</div></div>`; }).join('')}</div>

// 삭제되지 않은 칭찬만

const STAFF_PRAISE_KW = ['친절','응대','영상통화','화상통화','전화','설명','신속','대응','사용법','상담','도움','세심','꼼꼼','안내','알려주','알려 주','가르쳐','자세히','차근차근','정성','기사님','기사분','직원','담당자','원격지원','케어','챙겨','상냥'];
function isStaffPraise(p){ const emp=(VOCPRAISE[vocKey(p)]||{}).emp||p.emp; if(emp) return true; const t=p.text||''; return STAFF_PRAISE_KW.some(k=>t.includes(k)); }

function saveVocPraise(key, emp){
  if(!VOCPRAISE[key]) VOCPRAISE[key]={};
  if(emp==='') delete VOCPRAISE[key].emp; else VOCPRAISE[key].emp=emp;
  if(!VOCPRAISE[key].deleted && Object.keys(VOCPRAISE[key]).length===0) delete VOCPRAISE[key];
  save(LS_VOCPRAISE, VOCPRAISE); pushPatch({vocPraise:{[key]:VOCPRAISE[key]||null}}); rerenderVoc();
}
function deleteVocPraise(key){
  if(!confirm('이 칭찬 건을 목록에서 삭제할까요? (나중에 복원 가능)')) return;
  if(!VOCPRAISE[key]) VOCPRAISE[key]={};
  VOCPRAISE[key].deleted=true; save(LS_VOCPRAISE, VOCPRAISE); pushPatch({vocPraise:{[key]:VOCPRAISE[key]}}); rerenderVoc();
}
function restorePraise(){
  const before=Object.keys(VOCPRAISE);
  before.forEach(k=>{ delete VOCPRAISE[k].deleted; if(Object.keys(VOCPRAISE[k]).length===0) delete VOCPRAISE[k]; });
  const patch={}; before.forEach(k=>{ patch[k]=VOCPRAISE[k]||null; });
  save(LS_VOCPRAISE, VOCPRAISE); pushPatch({vocPraise:patch}); rerenderVoc();
}

/* ================= VOC Monthly (먼슬리 발표용) ================= */
function vocMonthAgg(){
  const dates=rangeDates('month', selDate);
  const v=aggVoc(dates);
  const byInd={}, byReason={};
  v.alerts.forEach(a=>{ const ed=VOCEDIT[vocKey(a)]||{};
    const ind=ed.industry||a.indBucket||'미지정';
    const rea=ed.reasonCat||(a.reasons[0]&&a.reasons[0].cat)||VOC_REASONS[5];
    byInd[ind]=(byInd[ind]||0)+1; byReason[rea]=(byReason[rea]||0)+1; });
  return {dates, v, byInd, byReason, totalIn:v.alerts.length};
}
function vocDailyTrend(dates){
  const counts=dates.map(d=>{ const vv=(slackDay(d)||{}).voc; return vv?(vv.alerts||[]).length:0; });
  const mx=Math.max(1,...counts);
  const n=dates.length, bw=16, gap=8, padL=12, padR=12, H=170, base=H-30, plotH=H-46;
  const W=Math.max(560, padL+padR+n*(bw+gap));
  const bars=dates.map((d,i)=>{ const c=counts[i], h=c/mx*plotH, x=padL+i*(bw+gap), y=base-h, day=parseYmd(d).getDate();
    return `<rect x="${x}" y="${y.toFixed(1)}" width="${bw}" height="${h.toFixed(1)}" rx="2" fill="${c>0?'#ff3b30':'#ececf0'}"></rect>`
      +(c>0?`<text x="${x+bw/2}" y="${(y-4).toFixed(1)}" text-anchor="middle" font-size="9" font-weight="700" fill="#424245">${c}</text>`:'')
      +`<text x="${x+bw/2}" y="${base+14}" text-anchor="middle" font-size="8.5" fill="#86868b">${day}</text>`;
  }).join('');
  return `<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}"><line x1="${padL-4}" y1="${base}" x2="${W-padR+4}" y2="${base}" stroke="#d2d2d7"/>${bars}</svg></div>`;
}

function kpiCard(lab, val, prev, tag){
  const diff = val-prev;
  const cls = diff>0?"up":diff<0?"down":"flat";
  const arrow = diff>0?"▲":diff<0?"▼":"–";
  const pct = prev>0? Math.round(Math.abs(diff)/prev*100)+"%" : (val>0?"신규":"0%");
  return `<div class="kpi">
    <div class="lab">${lab}</div>
    <div class="val">${val}<small>건</small></div>
    <div class="delta ${cls}">${arrow} ${pct} <span style="color:var(--gray2);font-weight:500">${tag}</span></div>
  </div>`;
}
function kpiPlain(lab, val){
  return `<div class="kpi">
    <div class="lab">${lab}</div>
    <div class="val">${val.toFixed(1)}<small>건</small></div>
    <div class="delta flat">평균 처리량</div>
  </div>`;
}
function medal(i){ return i===0?"🥇":i===1?"🥈":i===2?"🥉":`<span style="color:var(--gray2)">${i+1}.</span>`; }
function viewRangeText(mode,ref){
  const dates=rangeDates(mode,ref);
  if(mode==="day") return fmtKDate(parseYmd(ref));
  return `${fmtShort(dates[0])} ~ ${fmtShort(dates[dates.length-1])}`;
}

// 7일 스파크라인
function spark(cat,emp){
  const end=parseYmd(selDate); let vals=[];
  for(let i=6;i>=0;i--) vals.push(getCount(cat,ymd(addDays(end,-i)),emp));
  const mx=Math.max(1,...vals);
  return `<span class="spark">${vals.map(v=>{
    const h=Math.max(3, v/mx*22);
    return `<i class="${v===mx&&v>0?'hi':''}" style="height:${h}px"></i>`;}).join("")}</span>`;
}

// 기간 추이 막대 차트 (SVG)
function trendChart(cat, mode, ref){
  const dates = rangeDates(mode, ref);
  const vals = dates.map(d=> sumRange(cat,[d]));
  const mx = Math.max(1, ...vals);
  const gapUnit = Math.min(64, Math.max(30, 720/dates.length));
  const W=Math.max(560, dates.length*gapUnit);
  const H=220, pad=28, gap=(W-pad*2)/dates.length, bw=gap*0.6;
  const bars = dates.map((d,i)=>{
    const v=vals[i]; const h=(H-50)*(v/mx);
    const x=pad + i*gap + (gap-bw)/2, y=H-30-h;
    const dd=parseYmd(d); const isToday=d===ymd(today());
    const lbl = mode==="month"? (dd.getDate()) : `${dd.getMonth()+1}/${dd.getDate()}`;
    const col = isToday? "var(--blue)" : "#cfe3fb";
    return `<g>
      <rect x="${x}" y="${y}" width="${bw}" height="${h}" rx="4" fill="${col}"></rect>
      ${v>0?`<text x="${x+bw/2}" y="${y-6}" text-anchor="middle" font-size="11" font-weight="700" fill="#424245">${v}</text>`:''}
      <text x="${x+bw/2}" y="${H-12}" text-anchor="middle" font-size="10" fill="#86868b">${lbl}</text>
    </g>`;
  }).join("");
  const total = vals.reduce((a,b)=>a+b,0);
  return `<div class="chart-wrap">
    <svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
      <line x1="${pad}" y1="${H-30}" x2="${W-pad}" y2="${H-30}" stroke="var(--line)" stroke-width="1"></line>
      ${bars}
    </svg>
  </div>
  <div class="legend">
    <span><span class="swatch" style="background:var(--blue)"></span>오늘</span>
    <span><span class="swatch" style="background:#cfe3fb"></span>처리건수</span>
    <span style="margin-left:auto;font-weight:600;color:var(--ink)">기간 합계 ${total}건</span>
  </div>`;
}

function submitShare(){
  const ds=document.getElementById("sfDate").value;
  const emp=document.getElementById("sfEmp").value;
  const type=document.getElementById("sfType").value;
  const title=document.getElementById("sfTitle").value.trim();
  if(!ds||!emp) return;

  // 수정 모드면 기존 일정(단건) 먼저 제거
  let keepId=null;
  if(shareEdit){
    const src=SHARE[shareEdit.ds]||[];
    const idx=src.findIndex(e=>e.id===shareEdit.id);
    if(idx>=0){ keepId=src[idx].id; src.splice(idx,1); if(src.length===0) delete SHARE[shareEdit.ds]; }
  }

  if(type==="vacation"){
    // 휴가: 시작일~종료일 각 날짜에 하루씩 등록 (같은 grp 로 묶어 일괄 삭제 가능)
    let a=ds, b=document.getElementById("sfEndDate").value||ds;
    if(b<a){ const t=a; a=b; b=t; }
    const grp="v"+ds.replace(/-/g,'')+"_"+(Date.now()%100000);
    eachDate(a,b).forEach((d,i)=>{
      if(!SHARE[d]) SHARE[d]=[];
      SHARE[d].push({ id:grp+"_"+i, grp, emp, type, time:"", title });
    });
  } else {
    const s=document.getElementById("sfStart").value, e2=document.getElementById("sfEnd").value;
    let time="";
    if(s&&e2) time=`${s} ~ ${e2}`; else if(s) time=`${s} ~`; else if(e2) time=`~ ${e2}`;
    if(!SHARE[ds]) SHARE[ds]=[];
    SHARE[ds].push({ id: keepId || ("e"+ds.replace(/-/g,'')+"_"+SHARE[ds].length+"_"+emp.length), emp, type, time, title });
  }
  shareEdit=null;
  save(LS_SHARE, SHARE);
  closeShareForm();
  renderShare();
}
// 시작~종료(YYYY-MM-DD) 사이 날짜 배열
function eachDate(a,b){
  const out=[]; let d=parseYmd(a);
  while(ymd(d)<=b){ out.push(ymd(d)); d.setDate(d.getDate()+1); if(out.length>366) break; }
  return out;
}
function timeOptions(){
  let opts = `<option value="">미지정</option>`;
  for(let h=7; h<=18; h++){
    for(const mm of ["00","30"]){
      if(h===18 && mm==="30") break; // 18:00 까지
      const v=`${String(h).padStart(2,'0')}:${mm}`;
      opts += `<option value="${v}">${v}</option>`;
    }
  }
  return opts;
}
function removeShare(ds, id){
  if(!SHARE[ds]) return;
  const ev=SHARE[ds].find(e=>e.id===id); if(!ev) return;
  const t=typeMeta(ev.type);
  if(ev.grp){
    // 휴가(여러 날) → 그룹 전체 삭제
    let days=0; Object.values(SHARE).forEach(arr=>arr.forEach(e=>{ if(e.grp===ev.grp) days++; }));
    if(!confirm(`${ev.emp}님의 ${t.label}(${days}일) 전체를 삭제할까요?`)) return;
    Object.keys(SHARE).forEach(d=>{ SHARE[d]=SHARE[d].filter(e=>e.grp!==ev.grp); if(SHARE[d].length===0) delete SHARE[d]; });
  } else {
    if(!confirm(`${ev.emp}님의 ${t.label}${ev.title?' ('+ev.title+')':''} 일정을 삭제할까요?`)) return;
    SHARE[ds]=SHARE[ds].filter(e=>e.id!==id);
    if(SHARE[ds].length===0) delete SHARE[ds];
  }
  save(LS_SHARE, SHARE);
  renderShare();
}

/* ===== 드래그&드롭으로 일정 날짜 이동 ===== */
let shareDrag=null; // {ds, id}
function shareDragStart(ev, ds, id){
  shareDrag={ds, id};
  ev.dataTransfer.effectAllowed="move";
  try{ ev.dataTransfer.setData("text/plain", ds+"|"+id); }catch(e){}
  ev.currentTarget.classList.add("dragging");
}
function shareDragEnd(ev){ ev.currentTarget.classList.remove("dragging"); }
function shareDragOver(ev, cell){ ev.preventDefault(); ev.dataTransfer.dropEffect="move"; cell.classList.add("drop-hover"); }
function shareDragLeave(cell){ cell.classList.remove("drop-hover"); }
function shareDrop(ev, targetDs, cell){
  ev.preventDefault(); cell.classList.remove("drop-hover");
  let src=shareDrag;
  if(!src){ const d=(ev.dataTransfer.getData("text/plain")||"").split("|"); if(d.length===2) src={ds:d[0], id:d[1]}; }
  shareDrag=null;
  if(!src || src.ds===targetDs) return;           // 같은 날이면 무시
  const list=SHARE[src.ds]; if(!list) return;
  const idx=list.findIndex(e=>e.id===src.id); if(idx<0) return;
  const moved=list.splice(idx,1)[0];
  if(list.length===0) delete SHARE[src.ds];
  if(!SHARE[targetDs]) SHARE[targetDs]=[];
  SHARE[targetDs].push(moved);
  save(LS_SHARE, SHARE);
  renderShare();
}

const LS_AUTH = "opcare_authed_v1";
const PASS = "시프티";
function checkAuth(){
  // 저장된 로그인 날짜가 '오늘'이면 통과, 날짜가 바뀌면 다시 로그인

  }else{

    setTimeout(()=>el.focus(), 200);

function relock(){
  localStorage.removeItem(LS_AUTH);
  const lockEl=document.getElementById("lock"), input=document.getElementById("lockInput");
  input.value=""; document.getElementById("lockErr").textContent="";
  lockEl.classList.remove("hide");
  setTimeout(()=>input.focus(), 200);
}
function submitLogin(){
  const input=document.getElementById("lockInput");
  const err=document.getElementById("lockErr");
  if(input.value.trim()===PASS){
    localStorage.setItem(LS_AUTH, ymd(today()));   // 오늘 날짜 저장 → 같은 날은 자동 통과, 다음날 다시 요청
    document.getElementById("lock").classList.add("hide");
    err.textContent="";
    checkDutyAlert();
  }else{
    err.textContent="답변이 올바르지 않습니다. 다시 입력해 주세요.";
    input.classList.remove("shake"); void input.offsetWidth; input.classList.add("shake");
    input.select();
  }
}
